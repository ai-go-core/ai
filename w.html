<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>AI 生活小秘書 | 收益解鎖中</title>
    <style>
        :root { --gold: #D4AF37; --dark: #000000; --gold-light: #F7E7CE; }
        body { background: var(--dark); color: white; font-family: 'Microsoft JhengHei', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; overflow: hidden; }
        
        /* 視覺氣泡區 */
        .bubble { background: white; color: #333; border-radius: 25px; padding: 30px; width: 85%; max-width: 400px; position: relative; box-shadow: 0 0 40px rgba(212,175,55,0.3); margin-bottom: 20px; }
        .bubble::after { content: ''; position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 15px solid white; }
        
        .title { font-size: 1.8rem; font-weight: 900; margin: 0; line-height: 1.2; }
        .highlight { background: #ffff00; padding: 2px 10px; display: inline-block; transform: rotate(-1.5deg); margin-top: 10px; color: #000; font-weight: bold; }
        
        /* 核心視覺 */
        .visual-100 { font-size: 5.5rem; font-weight: 900; color: var(--gold); margin: 30px 0 5px 0; letter-spacing: -2px; text-shadow: 0 0 20px rgba(212,175,55,0.5); }
        .passive-label { letter-spacing: 5px; font-weight: bold; color: var(--gold); font-size: 0.9rem; margin-bottom: 40px; }

        /* 手動跳轉按鈕 - 帶有流光閃爍 */
        .btn-jump { 
            background: linear-gradient(135deg, #D4AF37 0%, #8A6D3B 100%); 
            color: black; border: none; padding: 15px 40px; border-radius: 50px; 
            font-size: 1.2rem; font-weight: bold; cursor: pointer; text-decoration: none;
            box-shadow: 0 0 20px rgba(212,175,55,0.6);
            transition: 0.3s; animation: pulse 2s infinite; margin-top: 20px;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(212,175,55,0.6); }
            50% { transform: scale(1.05); box-shadow: 0 0 35px rgba(212,175,55,0.9); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(212,175,55,0.6); }
        }

        /* 倒數與進度條 */
        .progress-box { width: 80%; max-width: 300px; margin-top: 40px; }
        .bar-bg { background: #222; height: 6px; border-radius: 10px; overflow: hidden; margin-top: 12px; border: 1px solid #333; }
        .bar-fill { 
            background: linear-gradient(90deg, #D4AF37, var(--gold-light), #D4AF37); 
            height: 100%; width: 100%; transform-origin: left; 
            transition: transform 1s linear; /* 讓移動更平滑 */
        }
    </style>
</head>
<body>

    <div class="bubble">
        <div class="title">解鎖在 AI 系統的</div>
        <div class="highlight">第一筆收益分潤</div>
        <div style="color: #888; font-size: 0.95rem; margin-top: 15px;">啟動回饋計畫，領取專屬連結</div>
    </div>

    <div class="visual-100">100%</div>
    <div class="passive-label">PASSIVE INCOME</div>

    <a id="jumpBtn" href="#" class="btn-jump">▲ 立即獲得金鑰連結 ▲</a>

    <div class="progress-box">
        <div style="font-size: 0.85rem; color: #777;">
            系統安全驗證中... <span id="timer">30</span>s
        </div>
        <div class="bar-bg">
            <div id="bar" class="bar-fill"></div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('uid') || 'AI 生活小秘書';
        // 目標連結
        const target = `https://liff.line.me/2008866908-jrsCWB9J?ref=${encodeURIComponent(uid)}`;
        
        // 設定按鈕連結
        document.getElementById('jumpBtn').href = target;

        // 設定 30 秒倒數
        let totalTime = 30; 
        let timeLeft = totalTime;
        
        const timerText = document.getElementById('timer');
        const bar = document.getElementById('bar');

        const interval = setInterval(() => {
            timeLeft--;
            timerText.innerText = timeLeft;
            
            // 進度條比例計算
            const scale = timeLeft / totalTime;
            bar.style.transform = `scaleX(${scale})`;

            if (timeLeft <= 0) {
                clearInterval(interval);
                window.location.href = target;
            }
        }, 1000);
    </script>
</body>
</html>
