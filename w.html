<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>AI 生活小秘書 | 收益解鎖</title>
    <style>
        :root { --gold: #D4AF37; --dark: #000000; --line-green: #06C755; }
        body { background: var(--dark); color: white; font-family: 'Microsoft JhengHei', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }

        /* 極致還原：對話氣泡 */
        .bubble-container { position: relative; width: 85%; max-width: 420px; background: white; border: 4px solid #000; border-radius: 40px; padding: 25px 20px; margin-bottom: 30px; box-shadow: 10px 10px 0px rgba(212,175,55,0.2); }
        
        /* 氣泡尖角與愛心裝飾 */
        .bubble-container::after { content: ''; position: absolute; bottom: -25px; left: 60px; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 25px solid #000; }
        .bubble-container::before { content: ''; position: absolute; bottom: -17px; left: 60px; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 25px solid white; z-index: 1; }
        .heart-top { position: absolute; top: -15px; left: 30px; font-size: 24px; color: #ff4d4d; }
        .heart-bottom { position: absolute; bottom: -10px; right: 80px; font-size: 20px; color: #ff4d4d; }

        /* 文案樣式還原 */
        .bubble-title { color: #333; font-size: 1.6rem; font-weight: 900; letter-spacing: -1px; }
        .highlight { background: #ffff00; color: #000; padding: 0 10px; display: inline-block; font-size: 1.8rem; margin: 8px 0; border: 2px solid #000; box-shadow: 3px 3px 0 #000; }
        .bubble-sub { color: #666; font-size: 0.95rem; font-weight: bold; margin-top: 5px; }

        /* 核心 100% 視覺 */
        .visual-100 { font-size: 6rem; font-weight: 900; color: var(--gold); margin-top: 20px; line-height: 1; }
        .passive-text { letter-spacing: 6px; font-size: 1rem; color: var(--gold); font-weight: bold; margin-bottom: 30px; }

        /* 按鈕樣式 */
        .btn-jump { background: linear-gradient(180deg, #FFB800 0%, #FF8A00 100%); color: #000; border: 3px solid #000; padding: 15px 45px; border-radius: 50px; font-size: 1.3rem; font-weight: 900; text-decoration: none; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* 倒數進度條區 */
        .progress-box { width: 80%; max-width: 300px; margin-top: 40px; }
        .timer-text { font-size: 0.85rem; color: #777; margin-bottom: 8px; }
        .bar-bg { background: #222; height: 8px; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        .bar-fill { background: linear-gradient(90deg, #D4AF37, #FFF, #D4AF37); height: 100%; width: 100%; transform-origin: left; transition: transform 1s linear; }
    </style>
</head>
<body>

    <div class="bubble-container">
        <span class="heart-top">❤️</span>
        <div class="bubble-title">解鎖在 AI 系統的</div>
        <div class="highlight">第一筆收益分潤</div>
        <div class="bubble-sub">新粉絲首次加入，100% 回饋給你</div>
        <span class="heart-bottom">❤️</span>
    </div>

    <div class="visual-100">100%</div>
    <div class="passive-text">PASSIVE INCOME</div>

    <a id="jumpBtn" href="#" class="btn-jump">▲ 立即獲得金鑰連結 ▲</a>

    <div class="progress-box">
        <div class="timer-text">系統安全驗證中... <span id="timer">30</span>s</div>
        <div class="bar-bg">
            <div id="bar" class="bar-fill"></div>
        </div>
    </div>

    <script>
    const params = new URLSearchParams(window.location.search);
    const uid = params.get('uid') || 'AI 生活小秘書';
    // 您的專屬 LIFF 推廣連結
    const target = `https://liff.line.me/2008866908-jrsCWB9J?ref=${encodeURIComponent(uid)}`;
    
    const jumpBtn = document.getElementById('jumpBtn');
    const timerText = document.getElementById('timer');
    const bar = document.getElementById('bar');
    
    jumpBtn.href = target;

    let totalTime = 30; 
    let timeLeft = totalTime;
    let stopTimer = false;

    // --- 關鍵：智慧返回偵測系統 ---
    // 透過 PageTransitionEvent 偵測用戶是否是按「返回鍵」回來的
    window.addEventListener('pageshow', function(event) {
        if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
            // 偵測到是「返回」行為，立即永久切斷自動跳轉
            stopTimer = true;
            timeLeft = 999; 
            timerText.innerText = "驗證已完成";
            bar.style.opacity = "0.2";
            console.log("偵測到返回動作，自動跳轉已禁用。");
        }
    });

    const interval = setInterval(() => {
        if (stopTimer) return; // 停止邏輯

        timeLeft--;
        timerText.innerText = timeLeft;
        
        // 進度條同步縮減
        const scale = timeLeft / totalTime;
        bar.style.transform = `scaleX(${scale})`;

        if (timeLeft <= 0) {
            clearInterval(interval);
            // 使用 .assign 確保歷史紀錄中留有 W.html，這才按得回上一頁
            window.location.assign(target);
        }
    }, 1000);

    // 用戶點擊按鈕跳轉時，也要視為正常操作
    jumpBtn.addEventListener('click', () => {
        stopTimer = true;
    });
</script>
</body>
</html>
