<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>AI 生活小秘書 | 解鎖您的第一筆分潤</title>
    <style>
        :root { --gold: #D4AF37; --black: #1a1a1a; --white: #ffffff; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: #000; color: var(--white); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 背景流光效果 */
        .bg-gradient { position: fixed; top: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #2c2c2c 0%, #000 100%); z-index: -1; }

        .container { max-width: 500px; margin: auto; padding: 20px; text-align: center; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }

        /* 仿圖片中的對話氣泡區 */
        .promo-card { background: var(--white); border-radius: 30px; padding: 30px; position: relative; color: #333; box-shadow: 0 10px 40px rgba(212, 175, 55, 0.3); margin-bottom: 40px; }
        .promo-card::after { content: ''; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 20px solid var(--white); }

        .title-main { font-size: 2.2em; font-weight: 900; margin: 0; color: #000; line-height: 1.2; }
        .highlight-box { display: inline-block; background: #ffff00; color: #000; padding: 5px 15px; transform: rotate(-2deg); font-size: 1.4em; margin-top: 10px; font-weight: bold; }
        .sub-text { color: #666; margin-top: 15px; font-size: 1.1em; letter-spacing: 1px; }

        /* 中央 100% 視覺 */
        .center-graphic { margin: 30px 0; font-size: 4em; font-weight: 900; color: var(--gold); text-shadow: 2px 2px 0px #fff; }

        /* 自動跳轉與進度條 */
        .auto-redirect-zone { margin-top: auto; padding-bottom: 40px; }
        .progress-container { width: 100%; height: 8px; background: #333; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .progress-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #D4AF37, #F7E7CE, #D4AF37); background-size: 200% 100%; animation: shimmer 2s infinite linear; transform-origin: left; }

        .btn-main { background: linear-gradient(135deg, #ff9000 0%, #ff5e00 100%); color: white; border: none; padding: 18px 40px; border-radius: 50px; font-size: 1.3em; font-weight: bold; cursor: pointer; box-shadow: 0 5px 20px rgba(255, 94, 0, 0.4); text-decoration: none; display: inline-block; width: 80%; }

        @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    </style>
</head>
<body>

<div class="bg-gradient"></div>

<div class="container">
    <div class="promo-card">
        <h1 class="title-main">解鎖在 AI 系統的</h1>
        <div class="highlight-box">第一筆收益分潤</div>
        <p class="sub-text">封測成員限定：100% 啟動回饋給您</p>
    </div>

    <div class="center-graphic">
        100%<br>
        <span style="font-size: 0.4em; letter-spacing: 5px;">PASSIVE INCOME</span>
    </div>

    <div class="auto-redirect-zone">
        <a id="jumpBtn" href="#" class="btn-main">▲ 即刻獲得專屬連結 ▲</a>
        <p style="margin-top: 15px; color: #aaa; font-size: 0.9em;">
            系統正在為您啟動金鑰... <span id="timer">5</span>s
        </p>
        <div class="progress-container">
            <div id="bar" class="progress-bar"></div>
        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const uid = params.get('uid') || 'Guest';
    // 跳轉目標
    const target = `https://liff.line.me/2008866908-jrsCWB9J?ref=${encodeURIComponent(uid)}`;
    document.getElementById('jumpBtn').href = target;

    // 關鍵設定：將秒數改為 7 秒 (您可以視需求改為 5 或 10)
    let totalTime = 7; 
    let timeLeft = totalTime;
    
    const timerText = document.getElementById('timer');
    const bar = document.getElementById('bar');

    timerText.innerText = timeLeft;

    const interval = setInterval(() => {
        timeLeft--;
        timerText.innerText = timeLeft;
        
        // 進度條平滑縮減邏輯
        const scale = timeLeft / totalTime;
        bar.style.transform = `scaleX(${scale})`;

        if (timeLeft <= 0) {
            clearInterval(interval);
            // 執行全自動跳轉
            window.location.href = target;
        }
    }, 1000);
</script>
</body>
</html>
