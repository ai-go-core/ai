<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>AI 帝國 | 實戰奪權贊助系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --gold-primary: #D4AF37; 
            --gold-light: #FFD700; 
            --dark-bg: #050505; 
            --neon-green: #00ff88; 
            --neon-orange: #ff8c00; 
            --neon-blue: #00e5ff; 
            --neon-red: #ff4444; 
        }
        
        body { 
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; 
            background: var(--dark-bg); 
            color: #fff; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            background: rgba(10, 10, 10, 1); 
            border: 1px solid var(--gold-primary); 
            border-radius: 20px; 
            padding: 20px; 
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            margin: 10px;
        }

        .brand-header { 
            margin-bottom: 15px; 
            border-bottom: 2px solid var(--gold-primary); 
            padding-bottom: 15px; 
            text-align: center; 
        }

        /* 👑 執政權告示牌 */
        .power-status {
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.2), rgba(0, 0, 0, 0.8));
            border: 1px solid var(--gold-primary);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .legal-notice {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--neon-red);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.8em;
            color: #ffcccc;
        }

        .report-card { 
            background: #0d0d0d; 
            border-radius: 15px; 
            padding: 15px; 
            border: 1px solid #222; 
        }

        .btn-main { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1.05em; 
            border: none;
            display: block;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-match { 
            background: linear-gradient(45deg, #D4AF37, #FFD700); 
            color: #000; 
        }

        .reward-tag { 
            display: block; 
            background: rgba(255, 140, 0, 0.1); 
            color: var(--neon-orange); 
            padding: 10px; 
            border-radius: 8px; 
            text-align: center; 
            border: 1px solid var(--neon-orange); 
            margin-bottom: 15px;
            font-weight: bold;
        }

        input { 
            width: 100%; 
            background: #111; 
            border: 1px solid #333; 
            color: #fff; 
            padding: 14px; 
            border-radius: 10px; 
            box-sizing: border-box; 
            margin-bottom: 12px; 
            outline: none;
        }

        #match-area { display: none; }

        .footer-text { 
            text-align: center; 
            margin-top: 30px; 
            font-size: 0.75em; 
            color: #555; 
            padding-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand-header">
        <h2 style="margin:0;"><span style="color:var(--gold-primary)">帝國贊助核心</span></h2>
        <div style="font-size: 0.85em; color: var(--gold-light);">J 區出局實戰驅動 · 豬羊變色</div>
    </div>

    <div class="power-status" id="power-monitor">
        <div style="font-size: 0.8em; color: #aaa;">當前 A 區領錢部隊</div>
        <div id="leader-type" style="font-size: 1.5em; font-weight: 900; color: var(--gold-light); margin: 5px 0;">
            <i class="fas fa-crown"></i> 單號領軍
        </div>
        <div id="last-hero" style="font-size: 0.7em; color: var(--neon-blue);">
            由初始序號啟動模式
        </div>
    </div>

    <div class="legal-notice">
        <i class="fas fa-exclamation-triangle"></i> <strong>鋼鐵律：</strong><br>
        1. 點對點贊助 3,000 元，屬自願資助，無法退還。<br>
        2. 當 J 區有人出局，奪權變色即刻啟動。<br>
        3. 0 PV 帳號將無法觸發任何媒合。
    </div>

    <div class="report-card">
        <div id="verify-zone">
            <p style="font-size:0.8em; color:#aaa; margin-bottom:10px;">UID：<span id="display-user">讀取中...</span></p>
            <input type="tel" id="v-phone" placeholder="輸入手機號碼">
            <input type="text" id="v-line" placeholder="輸入 LINE ID">
            <button id="match-btn" class="btn-main btn-match" onclick="executeMatch()">啟動實戰媒合</button>
        </div>

        <div id="match-area">
            <div id="task-tag" class="reward-tag">🎯 任務生成中...</div>
            <p style="font-size:0.9em; margin-bottom:10px;">匯款至受贈對象：<span id="target-code" style="color:var(--gold-light); font-weight:bold;">---</span></p>
            <div style="background:#000; padding:15px; border-radius:12px; border:1px solid var(--gold-primary);">
                <p style="font-size:0.8em; color:#aaa; margin:0 0 5px 0;">受贈帳戶：</p>
                <p id="target-bank" style="font-size:1em; color:var(--neon-blue); font-family: monospace;"></p>
                <p style="font-size:1.1em; font-weight:bold; color:var(--neon-red); margin:10px 0 0 0;">金額：NT$ 3,000</p>
            </div>
            <button class="btn-main" style="background:var(--neon-green); color:#000; margin-top:20px;" onclick="confirmSent()">已完成轉帳 🆗</button>
        </div>
    </div>

    <a href="https://ai-go-core.github.io/ai/" class="btn-main" style="background:rgba(255,255,255,0.1); color:#fff; margin-top:15px; font-size:0.9em;">
        <i class="fas fa-home"></i> 返回大廳
    </a>

    <div class="footer-text">
        實戰序號：<span id="display-sn">--</span> | 權力狀態：<span id="power-tag">穩定</span>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const currentUser = urlParams.get('user') || urlParams.get('id') || 'GUEST';
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzI40GU4iCGWnEXAcDvwJUDw4Tz3qYyPEmYzwqeNZwCcUPuuHEguIjvElrtExoVlQ0tdA/exec";

    document.getElementById('display-user').innerText = currentUser;

    // 🛡️ 奪權變色監控邏輯
    async function updateEmpireStatus() {
        try {
            const resp = await fetch(`${GAS_URL}?action=get_empire_status`);
            const data = await resp.json();
            
            // data 應包含：currentLeader (ODD/EVEN), lastHeroSN (完成最後一擊的序號)
            const leaderText = document.getElementById('leader-type');
            const heroText = document.getElementById('last-hero');
            
            if (data.currentLeader === "EVEN") {
                leaderText.innerHTML = '<i class="fas fa-crown"></i> 雙號領軍';
                heroText.innerText = `功臣序號 #${data.lastHeroSN} 擊穿 J 區完成變色`;
            } else {
                leaderText.innerHTML = '<i class="fas fa-crown"></i> 單號領軍';
                heroText.innerText = `初始狀態：單號負責 A 區`;
            }
        } catch (e) {
            console.log("狀態獲取延遲");
        }
    }

    async function executeMatch() {
        const phone = document.getElementById('v-phone').value.trim();
        const line = document.getElementById('v-line').value.trim();
        if(!phone || !line) { alert('填寫不全'); return; }

        const btn = document.getElementById('match-btn');
        btn.innerText = "⏳ 戰權判定中...";
        btn.disabled = true;

        try {
            // 請求媒合
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ 
                    action: "requestMatch", 
                    user: currentUser, 
                    phone: phone, 
                    lineId: line 
                })
            });

            const result = await response.json();
            if (result.status === "success") {
                document.getElementById('verify-zone').style.display = 'none';
                document.getElementById('match-area').style.display = 'block';
                document.getElementById('task-tag').innerText = `🎯 序號 #${result.sn} | ${result.task}`;
                document.getElementById('target-code').innerText = result.receiver.code;
                document.getElementById('target-bank').innerText = result.receiver.bankInfo;
                document.getElementById('display-sn').innerText = result.sn;
            } else {
                alert(result.msg || "資格不符或 0 PV 凍結。");
                btn.disabled = false;
                btn.innerText = "再次啟動實戰媒合";
            }
        } catch (e) {
            alert('系統校準中：' + e.message);
            btn.disabled = false;
        }
    }

    function confirmSent() {
        if(!confirm("確定已完成贊助轉帳？\n虛報將永久喪失帝國席位。")) return;
        alert('✅ 訊號已發送，靜候對方確認入帳。');
        window.location.href = "https://ai-go-core.github.io/ai/";
    }

    // 初始化讀取一次變色狀態
    updateEmpireStatus();
</script>
</body>
</html>
