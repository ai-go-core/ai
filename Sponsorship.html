<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>AI 生活小秘書 | 全方位數位輔助系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --gold-primary: #D4AF37; 
            --gold-light: #FFD700; 
            --dark-bg: #050505; 
            --neon-green: #00ff88; 
            --neon-orange: #ff8c00; 
            --neon-blue: #00e5ff; 
            --neon-red: #ff4444; 
        }
        
        body { 
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; 
            background: var(--dark-bg); 
            color: #fff; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            background: rgba(10, 10, 10, 1); 
            border: 1px solid var(--gold-primary); 
            border-radius: 20px; 
            padding: 20px; 
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            margin: 10px;
        }

        .brand-header { 
            margin-bottom: 15px; 
            border-bottom: 2px solid var(--gold-primary); 
            padding-bottom: 15px; 
            text-align: center; 
        }

        /* 👑 感恩位移監控看板 */
        .power-status {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(0, 0, 0, 0.9));
            border: 1px solid var(--gold-primary);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .legal-notice {
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid var(--neon-blue);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.85em;
            color: #e0f7fa;
            line-height: 1.6;
        }

        .report-card { 
            background: #0d0d0d; 
            border-radius: 15px; 
            padding: 15px; 
            border: 1px solid #222; 
        }

        .btn-main { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1.05em; 
            border: none;
            display: block;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-match { 
            background: linear-gradient(45deg, #D4AF37, #FFD700); 
            color: #000; 
        }

        .reward-tag { 
            display: block; 
            background: rgba(0, 255, 136, 0.1); 
            color: var(--neon-green); 
            padding: 10px; 
            border-radius: 8px; 
            text-align: center; 
            border: 1px solid var(--neon-green); 
            margin-bottom: 15px;
            font-weight: bold;
        }

        input { 
            width: 100%; 
            background: #111; 
            border: 1px solid #333; 
            color: #fff; 
            padding: 14px; 
            border-radius: 10px; 
            box-sizing: border-box; 
            margin-bottom: 12px; 
            outline: none;
        }

        #match-area { display: none; }

        .footer-text { 
            text-align: center; 
            margin-top: 30px; 
            font-size: 0.75em; 
            color: #555; 
            padding-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand-header">
        <h2 style="margin:0;"><span style="color:var(--gold-primary)">AI 生活小秘書</span></h2>
        <div style="font-size: 0.85em; color: var(--gold-light);">A-E 五區感恩位移 · 1500PV 實戰驅動</div>
    </div>

    <div class="power-status" id="power-monitor">
        <div style="font-size: 0.8em; color: #aaa;">當前感恩池狀態</div>
        <div id="leader-type" style="font-size: 1.3em; font-weight: 900; color: var(--gold-light); margin: 5px 0;">
            <i class="fas fa-sync-alt"></i> A-B 區能量對接中
        </div>
        <div id="last-hero" style="font-size: 0.7em; color: var(--neon-blue);">
            等待 1500PV 憑證啟動三包投放
        </div>
    </div>

    <div class="legal-notice">
        <i class="fas fa-shield-alt"></i> <strong>數位公民感恩準則：</strong><br>
        1. 進入 A 區需投放 3,000 元（分屬 A、B、C-E 聯合池）。<br>
        2. 依 3:2:1 原子投彈邏輯，E 區享有 50% 優先圓滿權重。<br>
        3. 每一位圓滿公民，背後均由 15 位公民良性循環成就。
    </div>

    <div class="report-card">
        <div id="verify-zone">
            <p style="font-size:0.8em; color:#aaa; margin-bottom:10px;">數位分身代號：<span id="display-user">讀取中...</span></p>
            <input type="tel" id="v-phone" placeholder="輸入手機號碼">
            <input type="text" id="v-line" placeholder="輸入 LINE ID">
            <button id="match-btn" class="btn-main btn-match" onclick="executeMatch()">啟動感恩位移媒合</button>
        </div>

        <div id="match-area">
            <div id="task-tag" class="reward-tag">🎯 任務生成中...</div>
            <p style="font-size:0.9em; margin-bottom:10px;">感恩對象（數位代號）：<span id="target-code" style="color:var(--gold-light); font-weight:bold;">---</span></p>
            <div style="background:#000; padding:15px; border-radius:12px; border:1px solid var(--gold-primary);">
                <p style="font-size:0.8em; color:#aaa; margin:0 0 5px 0;">受贈帳戶詳情：</p>
                <p id="target-bank" style="font-size:1em; color:var(--neon-blue); font-family: monospace;"></p>
                <p style="font-size:1.1em; font-weight:bold; color:var(--neon-red); margin:10px 0 0 0;">總投放金額：NT$ 3,000</p>
            </div>
            <button class="btn-main" style="background:var(--neon-green); color:#000; margin-top:20px;" onclick="confirmSent()">已完成感恩投放 🆗</button>
        </div>
    </div>

    <div class="footer-text">
        分身序號：<span id="display-sn">--</span> | 系統狀態：<span id="power-tag">五區位移中</span>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const currentUser = urlParams.get('user') || urlParams.get('id') || 'GUEST';
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzI40GU4iCGWnEXAcDvwJUDw4Tz3qYyPEmYzwqeNZwCcUPuuHEguIjvElrtExoVlQ0tdA/exec";

    document.getElementById('display-user').innerText = currentUser;

    async function updateEmpireStatus() {
        try {
            const resp = await fetch(`${GAS_URL}?action=get_empire_status`);
            const data = await resp.json();
            const leaderText = document.getElementById('leader-type');
            const heroText = document.getElementById('last-hero');
            
            if (data.status === "active") {
                leaderText.innerHTML = '<i class="fas fa-check-circle"></i> 五區循環正常';
                heroText.innerText = `最新圓滿：數位代號 #${data.lastHeroSN} 已領足 18,000`;
            }
        } catch (e) {
            console.log("狀態獲取延遲");
        }
    }

    async function executeMatch() {
        const phone = document.getElementById('v-phone').value.trim();
        const line = document.getElementById('v-line').value.trim();
        if(!phone || !line) { alert('請填寫完整聯繫資訊'); return; }

        const btn = document.getElementById('match-btn');
        btn.innerText = "⏳ 數位代號判定中...";
        btn.disabled = true;

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ 
                    action: "requestMatch", 
                    user: currentUser, 
                    phone: phone, 
                    lineId: line,
                    mode: "AtoE_RedPack"
                })
            });

            const result = await response.json();
            if (result.status === "success") {
                document.getElementById('verify-zone').style.display = 'none';
                document.getElementById('match-area').style.display = 'block';
                document.getElementById('task-tag').innerText = `🎯 序號 #${result.sn} | 啟動三包投放`;
                document.getElementById('target-code').innerText = result.receiver.code;
                document.getElementById('target-bank').innerText = result.receiver.bankInfo;
                document.getElementById('display-sn').innerText = result.sn;
            } else {
                alert(result.msg || "資格不符。請確認是否完成 1500PV 採購。");
                btn.disabled = false;
                btn.innerText = "再次啟動感恩位移媒合";
            }
        } catch (e) {
            alert('系統連接超時，請檢查網路後重試');
            btn.disabled = false;
        }
    }

    function confirmSent() {
        if(!confirm("確定已完成 3,000 元感恩投放？\n虛報將導致數位分身永久凍結。")) return;
        alert('✅ 訊號已同步至 C-E 聯合池，等待對象確認。');
        window.location.reload();
    }

    updateEmpireStatus();
</script>
</body>
</html>
