<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title><?= webMainTitle ?> | 贊助升級核心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --gold-primary: #D4AF37; 
            --gold-light: #FFD700; 
            --dark-bg: #050505; 
            --neon-green: #00ff88; 
            --neon-orange: #ff8c00; 
            --neon-blue: #00e5ff; 
            --neon-red: #ff4444; 
        }
        
        body { 
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; 
            background: var(--dark-bg); 
            color: #fff; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            background: rgba(10, 10, 10, 1); 
            border: 1px solid var(--gold-primary); 
            border-radius: 20px; 
            padding: 20px; 
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            margin: 10px;
        }

        .brand-header { 
            margin-bottom: 20px; 
            border-bottom: 2px solid var(--gold-primary); 
            padding-bottom: 15px; 
            text-align: center; 
        }

        .保牌提示 { 
            background: rgba(255, 140, 0, 0.1); 
            border: 1px solid var(--neon-orange); 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            font-size: 0.85em; 
            color: var(--neon-orange); 
            line-height: 1.6; 
        }

        .greeting-box { 
            background: linear-gradient(135deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,1) 100%); 
            border-radius: 15px; 
            padding: 18px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(212,175,55,0.3); 
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .keyword-tag { 
            background: rgba(212, 175, 55, 0.1); 
            color: var(--gold-light); 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-size: 0.75em; 
            border: 1px solid rgba(212,175,55,0.3);
            white-space: nowrap;
        }

        .section-title { 
            font-size: 0.95em; 
            color: var(--gold-primary); 
            text-align: left; 
            margin: 25px 0 12px 0; 
            border-left: 4px solid var(--gold-primary); 
            padding-left: 10px; 
            font-weight: bold; 
        }

        .condition-box { 
            background: rgba(0, 229, 255, 0.05); 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: 1px solid var(--neon-blue); 
        }

        .report-card { 
            background: #0d0d0d; 
            border-radius: 15px; 
            padding: 15px; 
            border: 1px solid #222; 
        }

        .btn-main { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px; 
            font-size: 1.05em; 
            display: block; 
            text-align: center; 
            text-decoration: none; 
            box-sizing: border-box; 
        }

        .btn-match { 
            background: linear-gradient(45deg, #D4AF37, #FFD700); 
            color: #000; 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); 
        }

        input { 
            width: 100%; 
            background: #111; 
            border: 1px solid #333; 
            color: #fff; 
            padding: 14px; 
            border-radius: 10px; 
            box-sizing: border-box; 
            margin-bottom: 12px; 
            font-size: 1em; 
            outline: none;
        }

        input:focus { border-color: var(--gold-primary); }

        .reward-tag { 
            display: block; 
            background: rgba(0, 255, 136, 0.1); 
            color: var(--neon-green); 
            padding: 10px; 
            border-radius: 8px; 
            font-weight: bold; 
            margin-bottom: 15px; 
            text-align: center; 
            border: 1px solid var(--neon-green); 
        }

        .copy-btn { 
            background: var(--neon-blue); 
            border: none; 
            color: #000; 
            cursor: pointer; 
            font-size: 0.75em; 
            padding: 4px 10px; 
            border-radius: 6px; 
            margin-left: 10px; 
            font-weight: bold;
        }

        #match-area { display: none; margin-top: 15px; }

        .footer-text { 
            text-align: center; 
            margin-top: 30px; 
            font-size: 0.75em; 
            color: #555; 
            padding-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand-header">
        <h2 style="margin:0;"><span style="color:var(--gold-primary)"><?= spMainTitle ?></span></h2>
        <div style="font-size: 0.85em; color: var(--gold-light);"><?= spSubTitle ?></div>
    </div>

    <div class="保牌提示">
        <i class="fas fa-exclamation-triangle"></i> <strong>領袖保牌提示：</strong><br>
        系統僅媒合狀態為 <strong>【活躍】</strong> 之帳戶。若您的帳戶處於 <strong>【暫停】</strong> 狀態（如未滿 1PV），將自動跳過受贈權利。
    </div>

    <div class="greeting-box">
        <p style="margin:0; font-weight:bold; color:var(--gold-light); font-size:1em;"><?= spGreeting ?></p>
        <div class="tag-container">
            <span class="keyword-tag">免費會員</span>
            <span class="keyword-tag">超級AI工具</span>
            <span class="keyword-tag">角色彩蛋</span>
            <span class="keyword-tag">50元購物金</span>
            <span class="keyword-tag">99元推薦獎金</span>
            <span class="keyword-tag">免費出國旅遊</span>
            <span class="keyword-tag">滿百提領</span>
            <span class="keyword-tag">消費全額抵扣</span>
        </div>
    </div>

    <div class="condition-box">
        <div style="font-size: 0.85em; color: var(--neon-blue);">
            <i class="fas fa-check-circle"></i> 活化門檻：帳戶需為活躍狀態 (1500 PV)<br>
            <i class="fas fa-coins"></i> 贊助金額：每筆固定為 NT$ 3,000
        </div>
    </div>

    <div class="section-title">🚀 創建數位分身 · 贊助媒合</div>
    <div class="report-card">
        <div id="verify-zone">
            <input type="tel" id="v-phone" placeholder="輸入主庫登記手機">
            <input type="text" id="v-line" placeholder="輸入主庫登記 LINE ID">
            <button id="enroll-btn" class="btn-main btn-match" onclick="handleMatch()"><?= spMatchBtn ?></button>
        </div>

        <div id="match-area">
            <div id="dynamic-task-tag" class="reward-tag">🎯 媒合成功！請執行自願贊助</div>
            <p style="font-size:0.9em; margin-bottom:10px;">請匯款至：<span id="target-name" style="color:var(--gold-light); font-weight:bold;">---</span></p>
            <div style="background:#000; padding:15px; border-radius:12px; border:1px solid var(--gold-primary);">
                <p style="font-size:0.8em; color:#aaa; margin:0 0 5px 0;">受贈帳戶資訊：</p>
                <p style="font-size:1em; color:var(--neon-blue); margin:0; font-family: monospace;">
                    <span id="target-bank">載入中...</span>
                    <button class="copy-btn" onclick="copyAccount()">一鍵複製</button>
                </p>
                <p id="dynamic-price" style="font-size:1.1em; font-weight:bold; color:var(--neon-red); margin:10px 0 0 0;">金額：NT$ 3,000</p>
            </div>
            <button id="confirm-btn" class="btn-main" style="background:var(--neon-green); color:#000; margin-top:20px;" onclick="markAsSent()">我已完成轉帳 🆗</button>
        </div>
    </div>

    <div class="footer-text">
        🛡️ 最終解釋權歸系統核心所有 | 最終代號：創建數位分身
    </div>
</div>

<script>
    // 自動取得當前 Web App 的網址
    const SCRIPT_URL = window.location.href.split('?')[0];

    async function handleMatch() {
        const phone = document.getElementById('v-phone').value.trim();
        const lineId = document.getElementById('v-line').value.trim();
        if(!phone || !lineId) { alert('請輸入完整驗證資訊！'); return; }

        const btn = document.getElementById('enroll-btn');
        btn.innerText = "⏳ 正在查驗數位核心...";
        btn.disabled = true;

        try {
            // 🚀 第一步：取得 1024 任務分流判定
            const taskResp = await fetch(`${SCRIPT_URL}?action=get_task`);
            const taskData = await taskResp.json();
            
            // 🚀 第二步：執行媒合
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ 
                  action: "requestMatch", 
                  phone: phone, 
                  lineId: lineId,
                  taskType: taskData.task // 將 1024 判定結果傳回後端
                })
            });

            const result = await response.json();
            if (result.status === "success") {
                document.getElementById('verify-zone').style.display = 'none';
                document.getElementById('match-area').style.display = 'block';
                
                // 🎯 根據 1024 任務動態更新 UI
                const tag = document.getElementById('dynamic-task-tag');
                tag.innerText = `🎯 媒合成功：${taskData.task}`;
                
                // 若為門票任務或反哺，變更顏色以區分
                if (taskData.target.includes("B_J_ZONE") || taskData.target.includes("A_ZONE_救災")) {
                  tag.style.borderColor = "var(--neon-orange)";
                  tag.style.color = "var(--neon-orange)";
                  document.getElementById('confirm-btn').style.background = "var(--neon-orange)";
                }

                document.getElementById('target-name').innerText = result.receiver.code;
                document.getElementById('target-bank').innerText = result.receiver.bankInfo;
                
            } else {
                alert(result.msg || "驗證失敗：請確認帳戶狀態。");
                btn.innerText = "<?= spMatchBtn ?>";
                btn.disabled = false;
            }
        } catch (e) {
            alert('❌ 系統對接失敗，請聯繫 AI 生活小秘書。');
            btn.disabled = false;
            btn.innerText = "重新嘗試驗證";
        }
    }

    function copyAccount() {
        const acc = document.getElementById('target-bank').innerText;
        const accountOnly = acc.match(/\d+/) ? acc.match(/\d+/)[0] : acc;
        
        const tempInput = document.createElement("input");
        tempInput.value = accountOnly;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);
        alert('帳號已複製！');
    }

    function markAsSent() {
        if(!confirm("確定已完成轉帳？")) return;
        alert('✅ 已通知受贈領袖/指揮塔查帳！請靜候「活躍」能量同步。');
        location.reload();
    }
</script>
</body>
</html>
