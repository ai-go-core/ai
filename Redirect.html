<!DOCTYPE html>
<html style="background:#000">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>&#8205;</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>body{background:#000;margin:0;padding:0;overflow:hidden;height:100vh}</style>
</head>
<body>
<script>
async function main(){
    try{
        await liff.init({liffId:"2008866908-jrsCWB9J"});
        if(!liff.isLoggedIn()){
            liff.login({redirectUri:window.location.href});
        }else{
            const p = await liff.getProfile();
            const r = new URLSearchParams(window.location.search).get('ref')||'系統總部';
            const api = "https://script.google.com/macros/s/AKfycbzI40GU4iCGWnEXAcDvwJUDw4Tz3qYyPEmYzwqeNZwCcUPuuHEguIjvElrtExoVlQ0tdA/exec";
            
            // 使用更輕量的背景傳送方式
            const url = api+"?action=bindReferrer&uid="+p.userId+"&ref="+r+"&t="+Date.now();
            if(navigator.sendBeacon){
                navigator.sendBeacon(url);
            }else{
                fetch(url,{mode:'no-cors'});
            }

            // 物理極限：幾乎不等待，發出請求後立即切換
            window.location.replace("https://line.me/ti/p/@641zpzus");
        }
    }catch(e){
        window.location.replace("https://line.me/ti/p/@641zpzus");
    }
}
main();
</script>
</body>
</html>
