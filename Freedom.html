        .wrapper {

        .feature-card {

            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-sizing: border-box;
            border-bottom: 3px solid #d4af37;

        .cta-button {

            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            margin: 40px 0;

            font-size: 14px;
            color: #888;
