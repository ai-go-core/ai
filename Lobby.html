<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 生活小秘書 / 全方位數位輔助</title>
    <style>
        body { 
            background-color: #050505; 
            color: #fff; 
            font-family: 'PingFang TC', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            overflow-y: auto;
        }

        .glow-box { 
            position: relative; 
            width: 92%; 
            max-width: 420px; 
            background: #000; 
            border-radius: 25px; 
            margin: 20px 0; 
        }

        .inner-content { 
            background: linear-gradient(160deg, #1a1a1a 0%, #050505 100%); 
            border-radius: 23px; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
        }

        /* 🛡️ 定性名稱標題區 */
        .header { text-align: center; margin-bottom: 20px; }
        .system-title { color: #FFD700; font-size: 1.3rem; font-weight: 800; letter-spacing: 1px; text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
        .system-subtitle { font-size: 0.8rem; color: #D4AF37; margin-top: 5px; font-weight: bold; letter-spacing: 2px; }
        
        .marquee {
            background: rgba(212, 175, 55, 0.1);
            color: #D4AF37;
            padding: 8px;
            font-size: 0.75rem;
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
            white-space: nowrap;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        /* 核心按鈕矩陣 - 修正版 */
        .nav-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* 確保永遠是兩列 */
            gap: 12px; 
            margin-top: 10px; 
        }
        
        .nav-item {
            background: linear-gradient(145deg, #D4AF37, #B8860B); /* 統一黃金按鍵色 */
            border: 1px solid #FFD700;
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            text-decoration: none;
            color: #000 !important; /* 黑字更顯目 */
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            min-height: 100px; /* 統一高度 */
            justify-content: center;
        }

        .nav-item:active { transform: scale(0.95); background: #FFD700; }
        .nav-icon { font-size: 1.6rem; margin-bottom: 8px; }
        .nav-text { font-size: 0.95rem; font-weight: bold; }
        .nav-desc { font-size: 0.6rem; opacity: 0.8; margin-top: 4px; }

        /* 特色亮點區域 */
        .feature-banner {
            margin-top: 25px;
            background: linear-gradient(90deg, rgba(212,175,55,0.2), transparent);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid #D4AF37;
        }
        .feature-title { color: #FFD700; font-size: 0.9rem; font-weight: bold; }
        .feature-list { font-size: 0.7rem; color: #ccc; margin-top: 5px; line-height: 1.6; }

        .footer { font-size: 0.65rem; color: #666; text-align: center; padding: 25px 0; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="glow-box">
        <div class="inner-content">
            <div class="header">
                <div class="system-title">AI 生活小秘書</div>
                <div class="system-subtitle">/ 全方位數位輔助</div>
                
                <div class="marquee">
                    <marquee scrollamount="5">🔥 封測限定：註冊即領人物蛋 + 50元購物金 | 推薦獎金 99 元無限發放 | 免會費、免配貨、消費全額抵扣 🚀</marquee>
                </div>
            </div>

            <div class="nav-grid">
                <a id="link-sponsorship" href="#" class="nav-item">
                    <span class="nav-icon">💰</span>
                    <span class="nav-text">贊助回饋</span>
                    <span class="nav-desc">7代複利制度</span>
                </a>

                <a id="link-profile" href="#" class="nav-item">
                    <span class="nav-icon">👤</span>
                    <span class="nav-text">個人資產</span>
                    <span class="nav-desc">角色蛋與收益</span>
                </a>

                <a id="link-contact" href="#" class="nav-item">
                    <span class="nav-icon">💬</span>
                    <span class="nav-text">聯繫領袖</span>
                    <span id="contact-desc" class="nav-desc">啟動數位分身</span>
                </a>

                <a id="link-writer" href="#" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">AI 工具箱</span>
                    <span class="nav-desc">封測功能解鎖</span>
                </a>
            </div>

            <div class="feature-banner">
                <div class="feature-title">🛡️ 領袖特權公告</div>
                <div class="feature-list">
                    • 系統核心贈送角色彩蛋，具備成長與收益價值。<br>
                    • 消費全額抵扣，收益達 100 即可申請提領。<br>
                    • 推薦獎金 99 元，達成目標享雙人免費國外旅遊。
                </div>
            </div>

            <div class="footer">
                AI系統核心 v3.0 | 最終解釋權歸系統核心所有
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id'); 
            const refParam = userId ? "?id=" + userId : "";

            if (userId) {
                document.getElementById('link-sponsorship').href = "Sponsorship.html" + refParam;
                document.getElementById('link-profile').href = "Profile.html" + refParam;
                document.getElementById('link-writer').href = "Writer.html" + refParam;
                
                document.getElementById('link-contact').href = "https://line.me/ti/p/~" + userId;
                document.getElementById('contact-desc').innerText = "ID: " + userId;
            } else {
                const protectFunc = function(e) { 
                    e.preventDefault(); 
                    alert('系統提示：請透過推薦連結進入指令大廳'); 
                };
                document.getElementById('link-sponsorship').onclick = protectFunc;
                document.getElementById('link-profile').onclick = protectFunc;
                document.getElementById('link-contact').onclick = protectFunc;
                document.getElementById('link-writer').onclick = protectFunc;
            }
        };
    </script>
</body>
</html>
