<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 生活小秘書 / 全方位數位輔助</title>
    <style>
        body { 
            background-color: #050505; 
            color: #fff; 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .glow-box { 
            width: 95%; 
            max-width: 450px; 
            margin: 15px auto;
        }

        .inner-content { 
            background: linear-gradient(160deg, #1a1a1a 0%, #050505 100%); 
            border-radius: 20px; 
            padding: 18px; 
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }

        .header { text-align: center; margin-bottom: 15px; }
        .system-title { color: #FFD700; font-size: 1.4rem; font-weight: bold; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .system-subtitle { font-size: 0.85rem; color: #D4AF37; margin-top: 4px; letter-spacing: 1px; }
        
        .marquee {
            background: rgba(212, 175, 55, 0.08);
            color: #D4AF37;
            padding: 8px;
            font-size: 0.75rem;
            border-radius: 8px;
            margin: 15px 0;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        /* 🚀 核心優化：自適應按鈕矩陣 */
        .nav-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
        }
        
        .nav-item {
            flex: 0 0 calc(50% - 6px); /* 準確的 2x2 比例 */
            background: #D4AF37; /* 回歸主理人最愛的黃金實體色 */
            border-radius: 16px;
            padding: 20px 5px;
            text-align: center;
            text-decoration: none;
            color: #000 !important;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .nav-item:active { transform: scale(0.96); opacity: 0.9; }
        .nav-icon { font-size: 2rem; margin-bottom: 8px; }
        .nav-text { font-size: 1rem; font-weight: bold; }
        .nav-desc { font-size: 0.65rem; margin-top: 4px; opacity: 0.8; font-weight: normal; }

        /* 特色亮點區域 */
        .feature-banner {
            margin-top: 20px;
            background: rgba(212, 175, 55, 0.05);
            padding: 15px;
            border-radius: 12px;
            border-left: 3px solid #D4AF37;
        }
        .feature-title { color: #FFD700; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; }
        .feature-list { font-size: 0.75rem; color: #aaa; line-height: 1.6; }

        .footer { font-size: 0.65rem; color: #555; text-align: center; padding: 20px 0; }
    </style>
</head>
<body>
    <div class="glow-box">
        <div class="inner-content">
            <div class="header">
                <div class="system-title">AI 生活小秘書</div>
                <div class="system-subtitle">/ 全方位數位輔助</div>
                
                <div class="marquee">
                    <marquee scrollamount="4">🔥 封測限定：註冊即領人物蛋 + 50元購物金 | 推薦獎金 99 元無限發放 | 免會費、免配貨 🚀</marquee>
                </div>
            </div>

            <div class="nav-container">
                <a id="link-sponsorship" href="#" class="nav-item">
                    <span class="nav-icon">💰</span>
                    <span class="nav-text">贊助回饋</span>
                    <span class="nav-desc">7代複利制度</span>
                </a>

                <a id="link-profile" href="#" class="nav-item">
                    <span class="nav-icon">👤</span>
                    <span class="nav-text">個人資產</span>
                    <span class="nav-desc">角色蛋與收益</span>
                </a>

                <a id="link-contact" href="#" class="nav-item">
                    <span class="nav-icon">💬</span>
                    <span class="nav-text">聯繫領袖</span>
                    <span id="contact-desc" class="nav-desc">啟動數位分身</span>
                </a>

                <a id="link-writer" href="#" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">AI 工具箱</span>
                    <span class="nav-desc">封測功能解鎖</span>
                </a>
            </div>

            <div class="feature-banner">
                <div class="feature-title">🛡️ 領袖特權公告</div>
                <div class="feature-list">
                    • 系統核心贈送角色彩蛋，具備成長價值。<br>
                    • 推薦獎金 99 元，達成目標享免費旅遊。
                </div>
            </div>

            <div class="footer">
                AI系統核心 v3.2 | 最終解釋權歸系統所有
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id'); 
            const refParam = userId ? "?id=" + userId : "";

            if (userId) {
                document.getElementById('link-sponsorship').href = "Sponsorship.html" + refParam;
                document.getElementById('link-profile').href = "Profile.html" + refParam;
                document.getElementById('link-writer').href = "Writer.html" + refParam;
                document.getElementById('link-contact').href = "https://line.me/ti/p/~" + userId;
                document.getElementById('contact-desc').innerText = "ID: " + userId;
            } else {
                const protectFunc = function(e) { 
                    e.preventDefault(); 
                    alert('系統提示：請透過推薦連結進入指令大廳'); 
                };
                document.querySelectorAll('.nav-item').forEach(el => el.onclick = protectFunc);
            }
        };
    </script>
</body>
</html>
