<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 生活小秘書 / 全方位數位輔助</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; width: 100%; min-height: 100vh; }
        .glow-box { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; }
        .inner-content { background: linear-gradient(160deg, #1a1a1a 0%, #050505 100%); border-radius: 20px; padding: 25px; border: 1px solid #333; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }
        .header { text-align: center; margin-bottom: 20px; }
        .system-title { color: #FFD700; font-size: 1.6rem; font-weight: bold; }
        .user-badge { display: inline-block; background: rgba(212, 175, 55, 0.2); color: #FFD700; padding: 8px 18px; border-radius: 50px; font-size: 0.9rem; margin-top: 10px; border: 1px solid #D4AF37; }
        .nav-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .nav-item { width: 100%; background: linear-gradient(45deg, #D4AF37, #FFD700); border-radius: 12px; padding: 18px; text-decoration: none; color: #000 !important; font-weight: bold; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .nav-icon { font-size: 1.5rem; margin-right: 15px; }
        .footer { font-size: 0.7rem; color: #555; text-align: center; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="glow-box">
        <div class="inner-content">
            <div class="header">
                <div class="system-title">數位生活圈大廳</div>
                <div id="user-badge" class="user-badge">👑 識別中...</div>
            </div>

            <div class="nav-container">
                <a id="link-sponsorship" href="#" class="nav-item">
                    <span class="nav-icon">💰</span>贊助回饋 (7代複利)
                </a>
                <a id="link-profile" href="#" class="nav-item">
                    <span class="nav-icon">👤</span>個人資產 (角色收益)
                </a>
                <a id="link-contact" href="#" class="nav-item" target="_blank">
                    <span class="nav-icon">💬</span>聯繫領袖 (<span id="ref-name">載入中</span>)
                </a>
                <a id="link-writer" href="#" class="nav-item">
                    <span class="nav-icon">⚙️</span>AI 工具箱 (文案庫)
                </a>
            </div>
            
            <div class="footer">AI系統核心 v3.6 | 最終代號：創建數位分身</div>
        </div>
    </div>

    <script>
        // 🚀 核心參數：請確保此網址正確
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzI40GU4iCGWnEXAcDvwJUDw4Tz3qYyPEmYzwqeNZwCcUPuuHEguIjvElrtExoVlQ0tdA/exec";
        const ADMIN_LINE_ID = "vvvip.tw"; 

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            // 認主：優先從 user 抓，失敗就從 id 抓
            const myId = params.get('user') || params.get('id') || "Guest";
            let refId = params.get('ref') || "";

            const badge = document.getElementById('user-badge');
            badge.innerText = "👑 領袖代號：" + myId;

            // 🛠️ 核心：刷新所有連結，帶入 user 與 ref
            function refreshLinks(finalRef) {
                const suffix = `&user=${encodeURIComponent(myId)}&ref=${encodeURIComponent(finalRef)}`;
                
                document.getElementById('link-sponsorship').href = GAS_URL + "?action=sponsorship" + suffix;
                document.getElementById('link-profile').href = GAS_URL + "?action=home" + suffix;
                document.getElementById('link-writer').href = GAS_URL + "?action=writer" + suffix;

                const contactBtn = document.getElementById('link-contact');
                const refLabel = document.getElementById('ref-name');

                if (finalRef && finalRef !== "null") {
                    contactBtn.href = "https://line.me/ti/p/~" + finalRef;
                    refLabel.innerText = finalRef;
                } else {
                    contactBtn.href = "https://line.me/ti/p/~" + ADMIN_LINE_ID;
                    refLabel.innerText = "官方客服";
                }
            }

            // 1. 先跑一次初始化
            refreshLinks(refId);

            // 2. 🚀 暴力尋祖：向後台請求 M 欄對應的 LINE ID
            if (myId !== "Guest") {
                fetch(`${GAS_URL}?action=get_leader_data&id=${encodeURIComponent(myId)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        if (data.teamCode) badge.innerText = "👑 領袖代號：" + data.teamCode;
                        // 如果後台有抓到 M 欄的親生推薦人，立即覆蓋
                        if (data.referrerLineId) {
                            console.log("尋祖鎖定成功:", data.referrerLineId);
                            refreshLinks(data.referrerLineId);
                        }
                    }
                })
                .catch(err => console.log("連線中..."));
            }
        };
    </script>
</body>
</html>
