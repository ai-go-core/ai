<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 生活小秘書 / 全方位數位輔助</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; width: 100%; min-height: 100vh; overflow-x: hidden; }
        .glow-box { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; }
        .inner-content { background: linear-gradient(160deg, #1a1a1a 0%, #050505 100%); border-radius: 20px; padding: 25px; border: 1px solid #333; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); min-height: 90vh; display: flex; flex-direction: column; }
        .header { text-align: center; margin-bottom: 20px; }
        .system-title { color: #FFD700; font-size: 1.6rem; font-weight: bold; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .user-badge { display: inline-block; background: rgba(212, 175, 55, 0.15); color: #FFD700; padding: 8px 18px; border-radius: 50px; font-size: 0.9rem; margin-top: 10px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .nav-container { display: flex; flex-direction: column; gap: 15px; flex-grow: 1; }
        .nav-item { width: 100%; background: linear-gradient(45deg, #D4AF37, #FFD700); border-radius: 12px; padding: 18px; text-decoration: none; color: #000 !important; font-weight: bold; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); transition: 0.2s; box-sizing: border-box; }
        .nav-item:active { transform: scale(0.97); opacity: 0.9; }
        .nav-icon { font-size: 1.6rem; margin-right: 15px; width: 30px; text-align: center; }
        .footer { font-size: 0.7rem; color: #555; text-align: center; margin-top: 30px; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="glow-box">
        <div class="inner-content">
            <div class="header">
                <div class="system-title">數位生活圈大廳</div>
                <div id="user-badge" class="user-badge">👑 識別身分中...</div>
            </div>

            <div class="nav-container">
                <a id="link-sponsorship" href="#" class="nav-item">
                    <span class="nav-icon">💰</span>贊助回饋 (7代複利)
                </a>
                <a id="link-profile" href="#" class="nav-item">
                    <span class="nav-icon">👤</span>個人資產 (角色收益)
                </a>
                <a id="link-contact" href="#" class="nav-item" target="_blank">
                    <span class="nav-icon">💬</span>聯繫推薦領袖 (<span id="ref-label">追蹤中</span>)
                </a>
                <a id="link-writer" href="#" class="nav-item">
                    <span class="nav-icon">⚙️</span>AI 工具箱 (武器庫)
                </a>
            </div>
            
            <div class="footer">AI系統核心 v3.6 | 目錄大廳輸入 M</div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzI40GU4iCGWnEXAcDvwJUDw4Tz3qYyPEmYzwqeNZwCcUPuuHEguIjvElrtExoVlQ0tdA/exec";
        const ADMIN_ID = ""; // 最終備案

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const myId = params.get('user') || params.get('id') || "Guest";
            let urlRef = params.get('ref') || ""; // 網址帶來的推薦人

            document.getElementById('user-badge').innerText = "👑 領袖代號：" + myId;

            function syncLinks(finalRef) {
                const query = `&user=${encodeURIComponent(myId)}&ref=${encodeURIComponent(finalRef)}`;
                document.getElementById('link-sponsorship').href = GAS_URL + "?action=sponsorship" + query;
                document.getElementById('link-profile').href = GAS_URL + "?action=home" + query;
                document.getElementById('link-writer').href = GAS_URL + "?action=writer" + query;

                const contactBtn = document.getElementById('link-contact');
                const label = document.getElementById('ref-label');

                if (finalRef && finalRef !== "null") {
                    contactBtn.href = "https://line.me/ti/p/~" + finalRef;
                    label.innerText = finalRef;
                } else if (urlRef) {
                    contactBtn.href = "https://line.me/ti/p/~" + urlRef;
                    label.innerText = urlRef;
                } else {
                    contactBtn.href = "https://line.me/ti/p/~" + ADMIN_ID;
                    label.innerText = "官方客服";
                }
            }

            // 1. 初始化
            syncLinks(urlRef);

            // 2. 🚀 從 Q 欄取回精準推薦人資訊
            if (myId !== "Guest") {
                fetch(`${GAS_URL}?action=get_leader_data&id=${encodeURIComponent(myId)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        // 這裡後台 API 必須回傳 Q 欄的數據給 data.referrerLineId
                        if (data.referrerLineId) {
                            console.log("Q欄尋祖成功:", data.referrerLineId);
                            syncLinks(data.referrerLineId);
                        }
                    }
                }).catch(e => console.log("尋祖同步中..."));
            }
        };
    </script>
</body>
</html>
