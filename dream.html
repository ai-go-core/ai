<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏡 全方位數位生活 · 修繕 ✕ 夢想 ✕ 補給</title>
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; --dark-gray: #1a1a1a; --cyan: #00FFFF; --green: #00FF00; --red: #FF4444; }
        * { box-sizing: border-box; } 
        
        body { 
            background-color: var(--black); 
            color: #ffffff; 
            font-family: -apple-system, 'PingFang TC', "Heiti TC", sans-serif; 
            margin: 0; 
            padding: 12px; 
            line-height: 1.4;
        }

        .container { max-width: 100%; margin: 0 auto; }

        /* 標題與領袖稱呼 */
        .user-header { text-align: center; padding: 10px 0 5px; }
        .user-name-tag { color: var(--cyan); font-weight: bold; font-size: 16px; text-shadow: 0 0 5px rgba(0, 255, 255, 0.3); }
        .user-welcome { color: #888; font-size: 12px; margin-right: 4px; }

        /* --- 家庭用品存量表 (優化勾選版) --- */
        .stock-box { background: #111; border-radius: 12px; padding: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .stock-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 15px; background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        .stock-check { width: 18px; height: 18px; margin-top: 3px; cursor: pointer; }
        .stock-info { flex: 1; }
        .stock-name { font-size: 14px; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .stock-bar-bg { background: #222; height: 8px; border-radius: 4px; overflow: hidden; }
        .stock-bar-fill { height: 100%; transition: width 0.5s; }
        .btn-buy { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold); 
            padding: 5px 12px; border-radius: 20px; font-size: 12px; text-decoration: none;
            transition: 0.3s; white-space: nowrap; align-self: center;
        }
        .btn-buy:hover { background: var(--gold); color: #000; }
        .item-checked { text-decoration: line-through; color: #666 !important; }

        /* 累積收益卡片 */
        .bonus-card { 
            background: linear-gradient(145deg, #1a1a1a, #000); 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 15px; 
        }
        .bonus-label { font-size: 13px; color: #888; margin-bottom: 5px; }
        .bonus-value { font-size: 28px; color: var(--gold); font-weight: bold; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }

        /* 標題樣式 */
        .section-title { 
            color: var(--gold); border-left: 4px solid var(--gold); padding-left: 10px; 
            margin: 20px 0 10px; font-size: 17px; font-weight: bold; 
        }
        
        .repair-box { background: #111; border-radius: 12px; padding: 15px; border: 1px solid #333; }
        
        /* 修繕輸入區 */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .input-row { display: flex; gap: 8px; }
        input { 
            background: #000; border: 1px solid #444; color: #fff; padding: 12px; 
            border-radius: 8px; font-size: 16px; outline: none; width: 100%;
        }
        input:focus { border-color: var(--gold); }
        .btn-save { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        
        .repair-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #222; 
        }
        .repair-info { display: flex; align-items: center; gap: 8px; flex: 1; }
        .repair-name { font-size: 14px; color: #eee; }
        .checked-text { text-decoration: line-through; color: #666 !important; }
        
        /* 策略筆記 */
        .strategy-note { background: rgba(0, 255, 255, 0.05); border: 1px dashed var(--cyan); padding: 12px; border-radius: 8px; font-size: 13px; color: #ccc; margin-top: 15px; line-height: 1.6; }
        
        /* 夢想格 */
        .dream-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px;}
        .dream-item { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 4 / 3; display: flex; align-items: flex-end; background-size: cover; background-position: center; border: 1px solid #333; }
        .dream-overlay { width: 100%; background: rgba(0,0,0,0.8); font-size: 11px; padding: 5px 0; color: var(--gold); text-align: center; }
        
        /* 旅遊進度條 */
        .progress-bar-bg { background: #222; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 8px; }
        .progress-bar-fill { background: linear-gradient(90deg, #D4AF37, #FFD700); height: 100%; width: 0%; transition: width 1.5s ease-in-out; }
        
        .btn-lobby { display: block; width: 100%; padding: 15px; background: linear-gradient(90deg, #D4AF37, #B8860B); color: #000; text-align: center; text-decoration: none; border-radius: 30px; font-size: 16px; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .footer { text-align: center; font-size: 11px; color: #555; margin: 40px 0 20px; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; padding: 10px 0 5px;">
        <h1 style="color: var(--gold); margin: 0; font-size: 20px; letter-spacing: 2px;">🏡 全方位數位生活</h1>
    </div>

    <div class="user-header">
        <span class="user-welcome">領袖：</span><span id="user_nickname" class="user-name-tag">數據同步中...</span>
    </div>

    <!-- 🌟 第一優先：家庭用品存量管理 (含勾選) -->
    <div class="section-title">🛒 零階段：日常補給清單</div>
    <div class="stock-box">
        <div id="stockList">
            <!-- 洗衣精 -->
            <div class="stock-item">
                <input type="checkbox" class="stock-check" onchange="toggleItem(this)">
                <div class="stock-info">
                    <div class="stock-name"><span class="name-label">洗衣精 (樂瑞嚴選)</span><span style="color:var(--red)">20%</span></div>
                    <div class="stock-bar-bg"><div class="stock-bar-fill" style="width: 20%; background: var(--red);"></div></div>
                </div>
                <a href="https://www.lerich.com.tw/index.php/shop/product" target="_blank" class="btn-buy">補貨</a>
            </div>
            <!-- 牙膏 -->
            <div class="stock-item">
                <input type="checkbox" class="stock-check" onchange="toggleItem(this)">
                <div class="stock-info">
                    <div class="stock-name"><span class="name-label">牙膏/漱口水/牙刷</span><span style="color:var(--gold)">50%</span></div>
                    <div class="stock-bar-bg"><div class="stock-bar-fill" style="width: 50%; background: var(--gold);"></div></div>
                </div>
                <a href="https://www.lerich.com.tw/index.php/shop/product" target="_blank" class="btn-buy">補貨</a>
            </div>
            <!-- 衛生紙 -->
            <div class="stock-item">
                <input type="checkbox" class="stock-check" onchange="toggleItem(this)">
                <div class="stock-info">
                    <div class="stock-name"><span class="name-label">高品質抽取衛生紙</span><span style="color:var(--green)">90%</span></div>
                    <div class="stock-bar-bg"><div class="stock-bar-fill" style="width: 90%; background: var(--green);"></div></div>
                </div>
                <a href="https://www.lerich.com.tw/index.php/shop/product" target="_blank" class="btn-buy">備貨</a>
            </div>
        </div>
        <p style="font-size: 11px; color: #666; margin-top: 5px; text-align: center;">勾選代表已檢查或已排程購買</p>
    </div>

    <!-- 收益卡片 -->
    <div class="bonus-card">
        <div class="bonus-label">目前累積數位收益</div>
        <div class="bonus-value" id="val_totalIncome">NT$ 0</div>
        <div style="color: #666; font-size: 11px; margin-top: 5px;">
            包含 <span style="color: var(--gold);">註冊贊助金 $50</span>、4%分潤、推薦獎勵
        </div>
    </div>

    <!-- 🔧 第一階段：修繕 -->
    <div class="section-title">🔧 第一階段：根基修復</div>
    <div class="repair-box">
        <div class="input-group">
            <input type="text" id="repairInput" placeholder="環境修繕項目 (例：更換沙發)">
            <div class="input-row">
                <input type="number" id="costInput" placeholder="預算 (NT$)">
                <button class="btn-save" id="saveBtn" onclick="addRepair()" style="flex: 0.6;">紀錄</button>
            </div>
        </div>
        <div id="repairList"></div>
        <div style="margin-top: 15px; text-align: right; color: var(--gold); font-size: 14px; font-weight: bold;">
            需求資金：<span id="totalNeed">NT$ 0</span>
        </div>
    </div>

    <!-- 🌟 第二階段：夢想 -->
    <div class="section-title">🌟 第二階段：卓越人生</div>
    <div class="repair-box">
        <div class="dream-grid">
            <div class="dream-item" style="background-image: url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=300');"><div class="dream-overlay">尊爵極致別墅</div></div>
            <div class="dream-item" style="background-image: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=300');"><div class="dream-overlay">頂級座駕</div></div>
            <div class="dream-item" style="background-image: url('https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=300');"><div class="dream-overlay">寰宇深度之旅</div></div>
            <div class="dream-item" style="background-image: url('https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?w=300');"><div class="dream-overlay">永續財富自由</div></div>
        </div>
        <div style="font-size: 13px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                <span style="color: var(--gold);">🛫 2027 激勵旅遊進度</span>
                <span style="color: var(--cyan);"><span id="travel_pts">0</span> / 300 點</span>
            </div>
            <div class="progress-bar-bg"><div id="travel_bar" class="progress-bar-fill"></div></div>
        </div>
    </div>

    <a href="javascript:void(0);" onclick="goToLobby()" class="btn-lobby">🚀 回到數位生活大廳</a>
    
    <div class="footer">
        <p>AI 生活小秘書 · 全方位數位輔助 認證</p>
        <p>提示回目錄大廳請輸入 M</p>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzI40GU4iCGWnEXAcDvwJUDw4Tz3qYyPEmYzwqeNZwCcUPuuHEguIjvElrtExoVlQ0tdA/exec"; 
    const LOBBY_BASE = "https://ai-go-core.github.io/ai/"; 
    const uid = new URLSearchParams(window.location.search).get('uid');

    // 切換家庭用品勾選狀態
    function toggleItem(checkbox) {
        const parent = checkbox.closest('.stock-item');
        const label = parent.querySelector('.name-label');
        if (checkbox.checked) {
            label.classList.add('item-checked');
            parent.style.opacity = "0.6";
        } else {
            label.classList.remove('item-checked');
            parent.style.opacity = "1";
        }
    }

    async function fetchData() {
        if (!uid) {
            document.getElementById('user_nickname').innerText = "未登錄領袖";
            return;
        }
        try {
            const response = await fetch(`${GAS_URL}?action=getUserDreamData&uid=${uid}`);
            const data = await response.json();
            
            if (data.status === "success") {
                document.getElementById('user_nickname').innerText = data.userName || "領袖";
                document.getElementById('val_totalIncome').innerText = "NT$ " + (Number(data.totalIncome) || 0).toLocaleString();
                document.getElementById('travel_pts').innerText = data.travelPts || 0;
                
                const progressPercent = Math.min((data.travelPts / 300) * 100, 100);
                setTimeout(() => { 
                    document.getElementById('travel_bar').style.width = progressPercent + "%"; 
                }, 300);
                
                renderRepairList(data.repairs);
            }
        } catch (e) { 
            console.error("同步失敗", e); 
            document.getElementById('user_nickname').innerText = "連線中斷";
        }
    }

    function renderRepairList(repairs) {
        const listContainer = document.getElementById('repairList');
        listContainer.innerHTML = "";
        let totalCost = 0;
        
        if (repairs && repairs.length > 0) {
            repairs.forEach(item => {
                const cost = parseInt(item.cost || 0);
                totalCost += cost;
                const div = document.createElement('div');
                div.className = 'repair-item';
                const isDone = (item.status === 'completed');
                
                div.innerHTML = `
                    <div class="repair-info">
                        <input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggleStatus(${item.row})" style="width:18px; height:18px;">
                        <span class="repair-name ${isDone ? 'checked-text' : ''}">${item.content}</span>
                    </div>
                    <span style="color: var(--gold); font-size: 14px; font-weight:bold;">$${cost.toLocaleString()}</span>
                `;
                listContainer.appendChild(div);
            });
        }
        document.getElementById('totalNeed').innerText = "NT$ " + totalCost.toLocaleString();
    }

    async function addRepair() {
        const input = document.getElementById('repairInput');
        const costInput = document.getElementById('costInput');
        if (!input.value.trim() || !uid) return;

        const btn = document.getElementById('saveBtn');
        btn.innerText = "⏳";
        btn.disabled = true;
        
        try {
            const apiCall = `${GAS_URL}?action=saveRepair&uid=${uid}&content=${encodeURIComponent(input.value)}&cost=${costInput.value || 0}`;
            await fetch(apiCall);
            input.value = ""; 
            costInput.value = "";
            await fetchData(); 
        } catch (err) { 
            console.error("儲存失敗", err); 
        } finally {
            btn.innerText = "紀錄";
            btn.disabled = false;
        }
    }

    async function toggleStatus(row) {
        if (!row) return;
        try {
            await fetch(`${GAS_URL}?action=toggleRepair&row=${row}`);
            fetchData();
        } catch (err) {
            console.error("更新狀態失敗", err);
        }
    }

    function goToLobby() { 
        window.location.href = LOBBY_BASE + "Lobby.html?uid=" + uid; 
    }

    window.onload = fetchData;
</script>
</body>
</html>
