<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏡 全方位數位生活 · 修繕 ✕ 夢想 ✕ 補給</title>
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; --dark-gray: #1a1a1a; --cyan: #00FFFF; --green: #00FF00; --red: #FF4444; }
        * { box-sizing: border-box; } 
        
        body { 
            background-color: var(--black); 
            color: #ffffff; 
            font-family: -apple-system, 'PingFang TC', "Heiti TC", sans-serif; 
            margin: 0; 
            padding: 12px; 
            line-height: 1.4;
        }

        .container { max-width: 100%; margin: 0 auto; }

        .user-header { text-align: center; padding: 10px 0 5px; }
        .user-name-tag { color: var(--cyan); font-weight: bold; font-size: 16px; text-shadow: 0 0 5px rgba(0, 255, 255, 0.3); }
        .user-welcome { color: #888; font-size: 12px; margin-right: 4px; }

        /* 分類按鈕 */
        .category-menu {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding: 5px 0;
            scrollbar-width: none;
        }
        .category-menu::-webkit-scrollbar { display: none; }
        .category-btn {
            background: #1a1a1a;
            border: 1px solid #444;
            color: #888;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.3s;
        }
        .category-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        /* 補給清單卡片 */
        .stock-box { background: #111; border-radius: 12px; padding: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .stock-item { 
            display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; 
            background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #222;
        }
        .stock-check { width: 18px; height: 18px; margin-top: 3px; cursor: pointer; accent-color: var(--gold); }
        .stock-info { flex: 1; }
        .stock-name { font-size: 14px; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .stock-bar-bg { background: #222; height: 6px; border-radius: 3px; overflow: hidden; }
        .stock-bar-fill { height: 100%; transition: width 0.8s ease-in-out; }
        .btn-buy { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold); 
            padding: 4px 12px; border-radius: 15px; font-size: 11px; text-decoration: none;
            transition: 0.3s; white-space: nowrap; align-self: center; margin-left: 5px;
        }
        .btn-buy:hover { background: var(--gold); color: #000; }
        .item-checked { text-decoration: line-through; color: #555 !important; opacity: 0.5; }

        /* 通用樣式 */
        .section-title { color: var(--gold); border-left: 4px solid var(--gold); padding-left: 10px; margin: 20px 0 10px; font-size: 17px; font-weight: bold; }
        .bonus-card { background: linear-gradient(145deg, #1a1a1a, #000); border: 1px solid rgba(212, 175, 55, 0.3); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        .bonus-value { font-size: 28px; color: var(--gold); font-weight: bold; }
        .btn-lobby { display: block; width: 100%; padding: 15px; background: linear-gradient(90deg, #D4AF37, #B8860B); color: #000; text-align: center; text-decoration: none; border-radius: 30px; font-size: 16px; font-weight: bold; margin-top: 20px; }
        .footer { text-align: center; font-size: 11px; color: #555; margin: 40px 0 20px; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; padding: 10px 0;">
        <h1 style="color: var(--gold); margin: 0; font-size: 20px; letter-spacing: 2px;">🏡 全方位數位生活</h1>
    </div>

    <div class="user-header">
        <span class="user-welcome">領袖：</span><span id="user_nickname" class="user-name-tag">載入中...</span>
    </div>

    <div class="section-title">🛒 零階段：日常補給清單</div>
    
    <div class="category-menu">
        <button class="category-btn active" onclick="filterStock('all', this)">全部</button>
        <button class="category-btn" onclick="filterStock('kitchen', this)">廚房用品</button>
        <button class="category-btn" onclick="filterStock('bathroom', this)">浴室用品</button>
        <button class="category-btn" onclick="filterStock('living', this)">生活用品</button>
    </div>

    <div class="stock-box">
        <div id="stockList">
            <!-- 廚房用品系列 -->
            <div class="stock-item" data-cat="kitchen">
                <input type="checkbox" class="stock-check" onchange="toggleItem(this)">
                <div class="stock-info">
                    <div class="stock-name"><span>洗碗精/洗潔劑</span><span style="color:var(--red)">15%</span></div>
                    <div class="stock-bar-bg"><div class="stock-bar-fill" style="width: 15%; background: var(--red);"></div></div>
                </div>
                <a href="https://www.lerich.com.tw" class="btn-buy">補貨</a>
            </div>
            <div class="stock-item" data-cat="kitchen">
                <input type="checkbox" class="stock-check" onchange="toggleItem(this)">
                <div class="stock-info">
                    <div class="stock-name"><span>廚房紙巾</span><span style="color:var(--gold)">40%</span></div>
                    <div class="stock-bar-bg"><div class="stock-bar-fill" style="width: 40%; background: var(--gold);"></div></div>
                </div>
                <a href="https://www.lerich.com.tw" class="btn-buy">補貨</a>
            </div>
            <div class="stock-item" data-cat="kitchen">
                <input type="checkbox" class="stock-check" onchange="toggleItem(this)">
                <div class="stock-info">
                    <div class="stock-name"><span>保鮮膜/鋁箔紙</span><span style="color:var(--green)">80%</span></div>
                    <div class="stock-bar-bg"><div class="stock-bar-fill" style="width: 80%; background: var(--green);"></div></div>
                </div>
                <a href="https://www.lerich.com.tw" class="btn-buy">備貨</a>
            </div>
            <div class="stock-item" data-cat="kitchen">
                <input type="checkbox" class="stock-check" onchange="toggleItem(this)">
                <div class="stock-info">
                    <div class="stock-name"><span>菜瓜布/鋼絲球</span><span style="color:var(--green)">100%</span></div>
                    <div class="stock-bar-bg"><div class="stock-bar-fill" style="width: 100%; background: var(--green);"></div></div>
                </div>
                <a href="https://www.lerich.com.tw" class="btn-buy">備貨</a>
            </div>

            <!-- 浴室用品系列 -->
            <div class="stock-item" data-cat="bathroom">
                <input type="checkbox" class="stock-check" onchange="toggleItem(this)">
                <div class="stock-info">
                    <div class="stock-name"><span>洗髮精/沐浴乳</span><span style="color:var(--gold)">45%</span></div>
                    <div class="stock-bar-bg"><div class="stock-bar-fill" style="width: 45%; background: var(--gold);"></div></div>
                </div>
                <a href="https://www.lerich.com.tw" class="btn-buy">補貨</a>
            </div>
            <div class="stock-item" data-cat="bathroom">
                <input type="checkbox" class="stock-check" onchange="toggleItem(this)">
                <div class="stock-info">
                    <div class="stock-name"><span>牙膏/漱口水</span><span style="color:var(--red)">20%</span></div>
                    <div class="stock-bar-bg"><div class="stock-bar-fill" style="width: 20%; background: var(--red);"></div></div>
                </div>
                <a href="https://www.lerich.com.tw" class="btn-buy">補貨</a>
            </div>
            <div class="stock-item" data-cat="bathroom">
                <input type="checkbox" class="stock-check" onchange="toggleItem(this)">
                <div class="stock-info">
                    <div class="stock-name"><span>浴廁清潔劑</span><span style="color:var(--gold)">30%</span></div>
                    <div class="stock-bar-bg"><div class="stock-bar-fill" style="width: 30%; background: var(--gold);"></div></div>
                </div>
                <a href="https://www.lerich.com.tw" class="btn-buy">補貨</a>
            </div>

            <!-- 生活用品系列 -->
            <div class="stock-item" data-cat="living">
                <input type="checkbox" class="stock-check" onchange="toggleItem(this)">
                <div class="stock-info">
                    <div class="stock-name"><span>抽取式衛生紙</span><span style="color:var(--red)">10%</span></div>
                    <div class="stock-bar-bg"><div class="stock-bar-fill" style="width: 10%; background: var(--red);"></div></div>
                </div>
                <a href="https://www.lerich.com.tw" class="btn-buy">急補</a>
            </div>
            <div class="stock-item" data-cat="living">
                <input type="checkbox" class="stock-check" onchange="toggleItem(this)">
                <div class="stock-info">
                    <div class="stock-name"><span>洗衣精/柔軟精</span><span style="color:var(--gold)">50%</span></div>
                    <div class="stock-bar-bg"><div class="stock-bar-fill" style="width: 50%; background: var(--gold);"></div></div>
                </div>
                <a href="https://www.lerich.com.tw" class="btn-buy">補貨</a>
            </div>
            <div class="stock-item" data-cat="living">
                <input type="checkbox" class="stock-check" onchange="toggleItem(this)">
                <div class="stock-info">
                    <div class="stock-name"><span>垃圾袋 (大/中/小)</span><span style="color:var(--green)">90%</span></div>
                    <div class="stock-bar-bg"><div class="stock-bar-fill" style="width: 90%; background: var(--green);"></div></div>
                </div>
                <a href="https://www.lerich.com.tw" class="btn-buy">備貨</a>
            </div>
        </div>
    </div>

    <div class="bonus-card">
        <div style="font-size: 13px; color: #888; margin-bottom: 5px;">目前累積數位收益</div>
        <div class="bonus-value" id="val_totalIncome">NT$ 0</div>
    </div>

    <a href="javascript:void(0);" onclick="goToLobby()" class="btn-lobby">🚀 回到數位生活大廳</a>
    
    <div class="footer">
        <p>AI 生活小秘書 · 全方位數位輔助 認證</p>
        <p>提示回目錄大廳請輸入 M</p>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzI40GU4iCGWnEXAcDvwJUDw4Tz3qYyPEmYzwqeNZwCcUPuuHEguIjvElrtExoVlQ0tdA/exec"; 
    const uid = new URLSearchParams(window.location.search).get('uid');

    function filterStock(category, btn) {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const items = document.querySelectorAll('.stock-item');
        items.forEach(item => {
            if (category === 'all' || item.getAttribute('data-cat') === category) {
                item.style.display = 'flex';
            } else {
                item.style.display = 'none';
            }
        });
    }

    function toggleItem(checkbox) {
        const itemInfo = checkbox.closest('.stock-item').querySelector('.stock-info');
        if (checkbox.checked) {
            itemInfo.classList.add('item-checked');
        } else {
            itemInfo.classList.remove('item-checked');
        }
    }

    async function fetchData() {
        if (!uid) return;
        try {
            const response = await fetch(`${GAS_URL}?action=getUserDreamData&uid=${uid}`);
            const data = await response.json();
            if (data.status === "success") {
                document.getElementById('user_nickname').innerText = data.userName || "領袖";
                document.getElementById('val_totalIncome').innerText = "NT$ " + (Number(data.totalIncome) || 0).toLocaleString();
            }
        } catch (e) { console.error("同步失敗", e); }
    }

    function goToLobby() { window.location.href = "https://ai-go-core.github.io/ai/Lobby.html?uid=" + uid; }
    window.onload = fetchData;
</script>
</body>
</html>
