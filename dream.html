<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 生活小秘書 · 全方位數位輔助</title>
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; --dark-gray: #1a1a1a; --cyan: #00FFFF; --green: #00FF00; --red: #FF4444; }
        * { box-sizing: border-box; } 
        body { background-color: var(--black); color: #ffffff; font-family: -apple-system, 'PingFang TC', sans-serif; margin: 0; padding: 12px; line-height: 1.4; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; padding: 15px 0; border-bottom: 1px solid #333; }
        .section-title { color: var(--gold); border-left: 4px solid var(--gold); padding-left: 10px; margin: 25px 0 10px; font-size: 17px; font-weight: bold; }
        .box-card { background: #111; border-radius: 12px; padding: 15px; border: 1px solid #333; margin-bottom: 15px; }
        .stage-tag { background: var(--gold); color: #000; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-right: 5px; }

        /* --- 第 1 階段：動態分類選單 --- */
        .category-item { margin-bottom: 8px; border: 1px solid #222; border-radius: 8px; overflow: hidden; }
        .category-btn { width: 100%; background: #1a1a1a; border: none; padding: 12px 15px; color: #eee; text-align: left; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .category-btn::after { content: '＋'; color: var(--gold); }
        .category-btn.active::after { content: '－'; }
        .product-list { display: none; background: #0a0a0a; padding: 5px 0; border-top: 1px solid #222; }
        .product-link { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; text-decoration: none; color: #bbb; font-size: 13px; border-bottom: 1px solid #1a1a1a; }
        .product-link:hover { background: #151515; }
        .pv-tag { color: var(--cyan); font-size: 10px; border: 1px solid var(--cyan); padding: 1px 4px; border-radius: 3px; margin-left: 8px; }

        /* --- 第 2 階段：修繕清單 --- */
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; width: 100%; }
        .btn-add { background: var(--gold); color: #000; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .repair-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #1a1a1a; border-radius: 8px; margin-bottom: 8px; }
        .btn-del { color: var(--red); background: none; border: none; font-size: 18px; cursor: pointer; }

        /* 第 3 階段：夢想網格 */
        .dream-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .dream-item { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 4/3; background-size: cover; display: flex; align-items: flex-end; border: 1px solid #333; }
        .dream-overlay { width: 100%; background: rgba(0,0,0,0.8); font-size: 11px; padding: 5px 0; color: var(--gold); text-align: center; }

        .loading-text { text-align: center; color: var(--gold); font-size: 12px; padding: 10px; }
        .footer { text-align: center; font-size: 11px; color: #555; margin: 40px 0 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="color: var(--gold); margin: 0; font-size: 20px;">AI 生活小秘書</h1>
        <div id="user_id" style="color: var(--cyan); font-size: 14px; margin-top: 5px;">數位代號：同步中...</div>
    </div>

    <!-- 收益試算 -->
    <div class="section-title">📊 數位資產 ✕ 7代 4% 收益試算</div>
    <div class="box-card">
        <div class="input-row">
            <input type="number" id="refCount" value="5" oninput="calc()" placeholder="人數">
            <input type="number" id="pvVal" value="1000" oninput="calc()" placeholder="PV">
        </div>
        <div style="text-align: right; color: var(--gold); font-size: 18px; font-weight: bold;">
            預計獎勵：<span id="monthTotal">$ 0</span>
        </div>
    </div>

    <!-- 第 1 階段 -->
    <div class="section-title"><span class="stage-tag">第 1 階段</span> 日用開支 ✕ 零成本</div>
    <div class="box-card" id="category_container">
        <div class="loading-text">正在從雲端資料庫抓取商品清單...</div>
    </div>

    <!-- 第 2 階段 -->
    <div class="section-title"><span class="stage-tag">第 2 階段</span> 環境修繕 ✕ 換全新</div>
    <div class="box-card">
        <div class="input-row">
            <input type="text" id="itemName" placeholder="修繕項目 (如：更換沙發)">
            <input type="number" id="itemCost" placeholder="預算">
            <button class="btn-add" onclick="addItem()">登錄</button>
        </div>
        <div id="repairList"></div>
        <div style="text-align: right; margin-top: 15px; border-top: 1px dotted #444; padding-top: 10px;">
            <span style="color:#888; font-size:13px;">總需求獎金：</span>
            <span style="color:var(--cyan); font-size:20px; font-weight:bold;" id="totalNeed">$ 0</span>
        </div>
    </div>

    <!-- 第 3 階段 -->
    <div class="section-title"><span class="stage-tag">第 3 階段</span> 卓越人生 ✕ 夢實現</div>
    <div class="box-card">
        <div class="dream-grid">
            <div class="dream-item" style="background-image: url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=400');"><div class="dream-overlay">尊爵極致別墅</div></div>
            <div class="dream-item" style="background-image: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=400');"><div class="dream-overlay">頂級座駕</div></div>
            <div class="dream-item" style="background-image: url('https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=400');"><div class="dream-overlay">寰宇深度之旅</div></div>
            <div class="dream-item" style="background-image: url('https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?w=400');"><div class="dream-overlay">永續財富自由</div></div>
        </div>
    </div>

    <div class="footer">
        <p>AI 生活小秘書 · 全方位數位輔助</p>
        <p>提示回目錄大廳請輸入 M</p>
    </div>
</div>

<script>
    // --- 雲端資料庫抓取邏輯 ---
    const GAS_WEB_APP_URL = "您的_GAS_發佈網址"; // 請在此處填入您的 GAS Web App 網址

    async function fetchProducts() {
        try {
            // 這裡模擬從資料庫抓取的過程，實際使用時會透過 fetch(GAS_WEB_APP_URL)
            // 資料格式範例：[{cat: "居家清潔", name: "樂瑞洗衣精", pv: 150, url: "...", tag: "熱銷"}, ...]
            const response = await fetch(GAS_WEB_APP_URL);
            const data = await response.json();
            renderCategories(data);
        } catch (e) {
            // 若 API 尚未設定，先顯示預設範例供您展示
            renderCategories([
                {cat: "🧼 居家清潔", name: "樂瑞 3效洗衣精", pv: 150, url: "https://www.lerich.com.tw/", tag: "熱銷"},
                {cat: "🧼 居家清潔", name: "濃縮洗碗精", pv: 80, url: "https://www.lerich.com.tw/", tag: "環保"},
                {cat: "🛀 個人洗沐", name: "艾草沐浴露", pv: 120, url: "https://www.lerich.com.tw/", tag: "推薦"},
                {cat: "🧻 生活百科", name: "樂瑞抽取衛生紙", pv: 45, url: "https://www.lerich.com.tw/", tag: "必備"}
            ]);
        }
    }

    function renderCategories(products) {
        const container = document.getElementById('category_container');
        container.innerHTML = ""; // 清空 loading
        
        // 分類群組化
        const groups = products.reduce((acc, obj) => {
            acc[obj.cat] = acc[obj.cat] || [];
            acc[obj.cat].push(obj);
            return acc;
        }, {});

        Object.keys(groups).forEach(catName => {
            const catDiv = document.createElement('div');
            catDiv.className = 'category-item';
            
            let productHtml = groups[catName].map(p => `
                <a href="${p.url}" target="_blank" class="product-link">
                    ${p.name} <span style="font-size:11px; color:#888;">${p.tag}</span>
                    <span class="pv-tag">${p.pv} PV</span>
                </a>
            `).join('');

            catDiv.innerHTML = `
                <button class="category-btn" onclick="toggleCat(this)">${catName}</button>
                <div class="product-list">${productHtml}</div>
            `;
            container.appendChild(catDiv);
        });
    }

    function toggleCat(btn) {
        btn.classList.toggle('active');
        const list = btn.nextElementSibling;
        list.style.display = list.style.display === 'block' ? 'none' : 'block';
    }

    // --- 其餘功能 ---
    function addItem() {
        const n = document.getElementById('itemName').value;
        const c = document.getElementById('itemCost').value;
        if(!n || !c) return;
        const list = document.getElementById('repairList');
        const div = document.createElement('div');
        div.className = 'repair-item';
        div.innerHTML = `<span>${n} <b style="color:var(--gold);">$${parseInt(c).toLocaleString()}</b></span><button class="btn-del" onclick="this.parentElement.remove(); updateTotal();">×</button>`;
        list.appendChild(div);
        updateTotal();
    }

    function updateTotal() {
        let total = 0;
        document.querySelectorAll('.repair-item b').forEach(b => {
            total += parseInt(b.innerText.replace(/[^0-9]/g, ''));
        });
        document.getElementById('totalNeed').innerText = '$ ' + total.toLocaleString();
    }

    function calc() {
        const r = parseInt(document.getElementById('refCount').value) || 0;
        const p = parseInt(document.getElementById('pvVal').value) || 0;
        let total = 0; let ppl = 1;
        for (let i = 1; i <= 7; i++) {
            if (i > 1) ppl *= r;
            total += (ppl * p * 0.04);
        }
        document.getElementById('monthTotal').innerText = '$ ' + Math.floor(total).toLocaleString();
    }

    window.onload = () => {
        calc();
        fetchProducts(); // 啟動時自動抓取資料庫
        const params = new URLSearchParams(window.location.search);
        document.getElementById('user_id').innerText = "數位代號：" + (params.get('uid') || "領袖-001");
    };
</script>
</body>
</html>
