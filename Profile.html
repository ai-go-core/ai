<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 領袖屬性面板 - 視覺修正版</title>
    <style>
        /* ✨ 動畫：呼吸感金蛋 */
        @keyframes eggBreath { 
            0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 15px rgba(255, 215, 0, 0.4)); } 
            50% { transform: scale(1.04); filter: brightness(1.2) drop-shadow(0 0 30px rgba(255, 215, 0, 0.7)); } 
        }
        @keyframes energyPulse {
            0% { opacity: 0.2; transform: scale(0.9); }
            50% { opacity: 0.5; transform: scale(1.1); }
            100% { opacity: 0.2; transform: scale(0.9); }
        }
        @keyframes holyShine { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.5) drop-shadow(0 0 10px #FFD700); } }
        @keyframes pulseMining { 0%, 100% { filter: drop-shadow(0 0 3px #00E5FF); } 50% { filter: drop-shadow(0 0 12px #00E5FF); } }

        body { background-color: #050505; color: #fff; font-family: 'PingFang TC', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .glow-box { width: 92%; max-width: 420px; background: #000; border-radius: 25px; margin: 20px 0; border: 1px solid #333; overflow: hidden; position: relative; padding-bottom: 20px; }
        .inner-content { padding: 20px; display: flex; flex-direction: column; }

        /* 進度條 */
        .top-hatch-area { margin-bottom: 25px; }
        .hatch-bar-bg { width: 100%; height: 12px; background: #222; border-radius: 10px; border: 1px solid #444; overflow: hidden; }
        .hatch-bar-fill { height: 100%; transition: width 1.5s ease; box-shadow: 0 0 15px #FFD700; background: linear-gradient(90deg, #FFD700, #FFFACD); }

        /* 核心區 */
        .hero-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding-bottom: 10px;
            margin-top: 10px;
        }

        .egg-wrapper {
            position: relative;
            width: 150px; 
            height: 200px;
            z-index: 1;
            animation: eggBreath 3s ease-in-out infinite;
        }
        .egg-main { 
            width: 100%; height: 100%; border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%; 
            background: radial-gradient(circle at 35% 35%, #fff 0%, #ffd700 45%, #8b6508 100%);
            border: 2px solid rgba(212, 175, 55, 0.8); position: relative;
        }
        .egg-glow-aura {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 260px; background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, transparent 70%);
            z-index: -1; animation: energyPulse 4s infinite;
        }

        .leader-info-block {
            width: 100%;
            display: flex;
            justify-content: space-between; 
            align-items: flex-end;
            padding: 0 5px;
            margin-top: 20px; 
            z-index: 2;
        }

        .info-left { display: flex; flex-direction: column; align-items: flex-start; }
        .leader-title { color: #FFD700; font-size: 0.75rem; font-weight: bold; margin-bottom: 2px; }
        .leader-name { font-size: 1.4rem; font-weight: 900; margin: 2px 0; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .leader-tag { color: #D4AF37; font-size: 0.85rem; }

        .sc-display { 
            display: inline-flex; align-items: center; background: rgba(0, 229, 255, 0.1); 
            border: 1px solid #00E5FF; padding: 6px 14px; border-radius: 20px;
            box-shadow: 0 2px 10px rgba(0, 229, 255, 0.2);
        }

        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-card { background: rgba(255, 255, 255, 0.03); padding: 12px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .card-box { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; border-left: 4px solid #D4AF37; margin-bottom: 12px; cursor: pointer; }
        
        .travel-bar-bg { width: 100%; height: 8px; background: #222; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .travel-bar-fill { height: 100%; background: linear-gradient(90deg, #00E5FF, #fff); box-shadow: 0 0 10px #00E5FF; transition: width 1.5s ease; }

        .asset-bar { display: grid; grid-template-columns: repeat(3, 1fr); background: linear-gradient(145deg, #151515, #000); border: 1px solid #D4AF37; border-radius: 18px; padding: 15px 5px; margin: 15px 0; }
        .asset-btn { text-align: center; }
        .asset-label { font-size: 0.7rem; font-weight: bold; color: #D4AF37; margin-top: 5px; display: block; }
        .medal-icon { font-size: 2.2rem !important; display: block; animation: holyShine 2s ease-in-out infinite; }
        .mining-glow { animation: pulseMining 2s ease-in-out infinite; }

        .system-footer { font-size: 0.6rem; color: #444; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="glow-box">
    <div class="inner-content">
        <div class="top-hatch-area">
            <div style="display:flex; justify-content:space-between; color:#FFD700; font-size:0.85rem; font-weight:bold; margin-bottom:8px;">
                <span>🐣 破蛋孵化進度</span><span id="hatch-pct">0%</span>
            </div>
            <div class="hatch-bar-bg"><div id="hatch-fill" class="hatch-bar-fill" style="width: 0%;"></div></div>
        </div>

        <div class="hero-container">
            <div class="egg-glow-aura"></div>
            <div class="egg-wrapper">
                <div id="dynamic-egg" class="egg-main">
                    <div id="crack-container" style="position:absolute; width:100%; height:100%;"></div>
                </div>
            </div>
            
            <div class="leader-info-block">
                <div class="info-left">
                    <div class="leader-title">🎖️ 封測先鋒領袖</div>
                    <div id="u-name" class="leader-name">載入中...</div>
                    <div id="u-team" class="leader-tag">數位分身同步中</div>
                </div>
                <div class="sc-display">
                    <span id="u-sc" style="color:#00E5FF; font-weight:bold; font-size:1.1rem;">0</span>
                    <span style="color:#00E5FF; font-size:0.8rem; margin-left:5px; font-weight:900;">SC</span>
                </div>
            </div>
        </div>

        <div class="stat-row">
            <div class="stat-card">
                <div style="color:#BBB; font-size:0.65rem;">👥 個人小組</div>
                <div id="u-group" style="color:#FFD700; font-size:1.1rem; font-weight:bold;">0</div>
            </div>
            <div class="stat-card">
                <div style="color:#BBB; font-size:0.65rem;">🌍 系統註冊</div>
                <div id="u-sys" style="color:#00E5FF; font-size:1.1rem; font-weight:bold;">0</div>
            </div>
        </div>

        <div class="card-box">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="color:#BBB; font-size:0.8rem;">🧧 入籍累積總收益</span>
                <span id="u-cum" style="color:#FFF; font-weight:bold; font-size:1.3rem;">NT$ 50</span>
            </div>
        </div>

        <div class="card-box" style="border-left-color: #00E5FF;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="color:#00E5FF; font-size:0.8rem;">✈️ 韓國雙人遊積分</span>
                <span id="u-travel" style="color:#fff; font-weight:bold;">0 / 300</span>
            </div>
            <div class="travel-bar-bg"><div id="travel-fill" class="travel-bar-fill" style="width:0%;"></div></div>
        </div>

        <div class="asset-bar">
            <div class="asset-btn">
                <span style="font-size:1.8rem; display:block;">🥚</span>
                <span class="asset-label">角色卵</span>
            </div>
            <div class="asset-btn mining-glow">
                <span style="font-size:1.8rem; display:block;">🏭</span>
                <span class="asset-label">算力礦場</span>
            </div>
            <div class="asset-btn">
                <span class="medal-icon">🏆</span>
                <span class="asset-label">創世勳章</span>
            </div>
        </div>

        <a id="back-home" href="Lobby.html" class="card-box" style="text-align:center; color:#000; background:linear-gradient(180deg, #D4AF37, #B8860B); font-weight:bold; text-decoration:none; display:block;">返回 AI 指令大廳</a>
        <div class="system-footer">最終解釋權歸系統核心所有</div>
    </div>
</div>

<script>
    // 🚀 核心 API 位址
    const API = "https://script.google.com/macros/s/AKfycbyZBh3TzIOpmP9qzZ8YZPeZbVbs2J_gVbjsWw0ZJzWlD9eB_LSJ7-wePJj8oYTyT9Do/exec";

    window.onload = function() {
        // 🚀 1. 修正：同時抓取推薦人(id)與主人代號(user)
        const urlParams = new URLSearchParams(window.location.search);
        const refId = urlParams.get('id');
        const myCode = urlParams.get('user');

        // 🚀 2. 修正：返回大廳時，要把身分帶回去，否則大廳會變「失憶」
        const backBtn = document.getElementById('back-home');
        backBtn.href = "Lobby.html?id=" + (refId || "") + "&user=" + (myCode || "");

        // 🚀 3. 修正：優先使用本人代號向資料庫請求數據
        if (myCode && myCode !== "null") {
            loadData(myCode);
        } else if (refId && refId !== "null") {
            // 如果只有推薦人 ID (通常是舊版相容)，則嘗試載入該 ID
            loadData(refId);
        } else {
            document.getElementById('u-name').innerText = "未登入領袖";
        }
    };

    async function loadData(targetId) {
        try {
            // 🚀 4. 發送請求：使用 action=get_leader_data 取得該代號的資料
            const r = await fetch(`${API}?action=get_leader_data&id=${encodeURIComponent(targetId)}`);
            const d = await r.json();
            
            if (d.success) {
                // 渲染資料
                document.getElementById('u-name').innerText = d.name || "領袖";
                document.getElementById('u-team').innerText = d.teamCode || "數位分身同步中";
                document.getElementById('u-sc').innerText = formatVal(d.sc);
                
                // 累積收益 (50基數 + 獎金)
                const bonus = Number(d.bonusPaid) || 0;
                document.getElementById('u-cum').innerText = "NT$ " + (50 + bonus).toLocaleString();
                
                document.getElementById('u-group').innerText = d.groupTotal || 0;
                document.getElementById('u-sys').innerText = d.sysTotal || 0;
                
                // 旅遊進度
                let tvl = Number(d.travel) || 0;
                document.getElementById('u-travel').innerText = tvl + " / 300";
                document.getElementById('travel-fill').style.width = Math.min(100, (tvl/300)*100) + "%";

                // 孵化進度 (假設 1000 人為滿)
                let progress = Math.min(100, (Number(d.groupTotal)/1000)*100);
                document.getElementById('hatch-fill').style.width = progress + "%";
                document.getElementById('hatch-pct').innerText = Math.floor(progress) + "%";
            } else {
                document.getElementById('u-name').innerText = "查無領袖資料";
            }
        } catch(e) { 
            console.error("ERR", e); 
            document.getElementById('u-name').innerText = "系統連線失敗";
        }
    }

    function formatVal(n) {
        let v = typeof n === 'string' ? Number(n.replace(/,/g,'')) : Number(n);
        if (v >= 10000) return (v/10000).toFixed(1) + " 萬";
        return v.toLocaleString();
    }
</script>
</body>
</html>
