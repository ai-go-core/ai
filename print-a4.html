<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>A4 四格海報排版系統</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f0f0f0; font-family: "Microsoft JhengHei", sans-serif; }
        .page {
            width: 210mm; height: 297mm; /* 標準 A4 尺寸 */
            padding: 10mm; margin: 10mm auto;
            background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: 1fr 1fr; /* 二行 */
            grid-template-rows: 1fr 1fr;    /* 二列 */
            gap: 15mm; /* 四格之間的間距 */
            box-sizing: border-box;
        }
        .poster-card {
            border: 1px dashed #ccc; /* 切割線 */
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 10px; text-align: center;
        }
        .title { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .top-text { color: #D4AF37; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .qr-img { width: 60%; height: auto; }
        .footer { margin-top: 10px; font-size: 14px; color: #666; }
        @media print {
            body { background: none; margin: 0; }
            .page { margin: 0; box-shadow: none; border: none; }
            .no-print { display: none; }
        }
        .no-print { position: fixed; top: 20px; right: 20px; padding: 10px 20px; background: #D4AF37; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <button class="no-print" onclick="window.print()">🖨️ 直接列印此頁</button>
    <div class="page" id="printArea">
        <script>
            const params = new URLSearchParams(window.location.search);
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${params.get('url')}`;
            const cardHtml = `
                <div class="poster-card">
                    <div class="title">${params.get('title') || '數位領袖邀請'}</div>
                    <div class="top-text">${params.get('top') || ''}</div>
                    <img src="${qrUrl}" class="qr-img">
                    <div class="footer">推薦人：${params.get('name') || '數位領袖'}</div>
                </div>
            `;
            // 生成四個格子
            document.write(cardHtml + cardHtml + cardHtml + cardHtml);
        </script>
    </div>
</body>
</html>
