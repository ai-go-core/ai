<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>AI 生活小秘書 | 個人數位資產儀表板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --gold-light: #FFD700; --bg: #050505; --card-bg: rgba(30, 30, 30, 0.9); }
        body { font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 450px; }
        
        /* 標題區 */
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--gold); padding-bottom: 15px; }
        .header h1 { font-size: 1.5em; letter-spacing: 2px; margin: 0; color: var(--gold); }
        
        /* 資產卡片 */
        .asset-card { background: var(--card-bg); border: 1px solid #444; border-left: 4px solid var(--gold); border-radius: 12px; padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .asset-label { font-size: 0.85em; color: #888; display: block; margin-bottom: 5px; }
        .asset-value { font-size: 1.8em; font-weight: bold; font-family: 'Courier New', monospace; color: #fff; }
        .unit { font-size: 0.4em; margin-left: 5px; color: var(--gold-light); }
        
        /* 特殊顏色 */
        .sc-energy { color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.3); }
        .income-gold { color: var(--gold-light); text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        
        /* 載入動畫 */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; transition: 0.5s; }
        .spinner { border: 4px solid rgba(212, 175, 55, 0.1); border-left-color: var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 返回按鈕 */
        .back-btn { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--gold); color: var(--gold); border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; text-decoration: none; display: block; text-align: center; }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay"><div class="spinner"></div></div>

<div class="container">
    <div class="header">
        <h1>個人數位資產查詢</h1>
        <div style="font-size: 0.8em; color: #666; margin-top: 5px;">領袖編號：<span id="display-id">---</span></div>
    </div>

    <!-- 能量卡片 -->
    <div class="asset-card">
        <span class="asset-label"><i class="fas fa-bolt"></i> SC 數位能量 (當前總額)</span>
        <div class="asset-value sc-energy" id="sc-balance">0<span class="unit">SC</span></div>
    </div>

    <!-- 收益卡片 -->
    <div class="asset-card">
        <span class="asset-label"><i class="fas fa-coins"></i> 4% 累積收益 (歷史總獎金)</span>
        <div class="asset-value income-gold" id="total-income">$ 0</div>
    </div>

    <!-- 團隊卡片 -->
    <div class="asset-card">
        <span class="asset-label"><i class="fas fa-users"></i> 團隊總人數 (1-7代)</span>
        <div class="asset-value" id="team-count">0<span class="unit">人</span></div>
    </div>

    <!-- 旅遊點數 -->
    <div class="asset-card">
        <span class="asset-label"><i class="fas fa-plane"></i> 全球旅遊積點</span>
        <div class="asset-value" style="color: #00e5ff;" id="travel-points">0<span class="unit">pts</span></div>
    </div>

    <a href="javascript:history.back()" class="back-btn">返回數位大廳</a>
</div>

<script>
    // 1. 抓取網址參數
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('ref'); 
    const GAS_API_URL = '您的_GAS_發佈網址'; // 重要：請填入您的 GAS Web App URL

    document.getElementById('display-id').innerText = userId || '未識別';

    // 2. 向後端請求資料
    async function fetchAssets() {
        if (!userId) {
            alert("⚠️ 錯誤：找不到領袖識別碼");
            return;
        }

        try {
            // 注意：GAS 需支援 getReferrerDataById 邏輯並回傳 JSON
            const response = await fetch(`${GAS_API_URL}?action=getAssets&uid=${userId}`);
            const data = await response.json();

            if (data) {
                // 動態更新數值
                animateValue("sc-balance", 0, data.scBalance, 1000);
                animateValue("total-income", 0, data.income, 1000, "$ ");
                animateValue("team-count", 0, data.teamTotal, 1000);
                animateValue("travel-points", 0, data.travel, 1000);
            }
        } catch (error) {
            console.error("資料讀取失敗", error);
            // 測試用模擬數據 (若 API 尚未佈署)
            document.getElementById('sc-balance').innerText = "連線中...";
        } finally {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        }
    }

    // 數字滾動動畫效果
    function animateValue(id, start, end, duration, prefix = "") {
        const obj = document.getElementById(id);
        const range = end - start;
        let startTime = null;
        const step = (timestamp) => {
            if (!startTime) startTime = timestamp;
            const progress = Math.min((timestamp - startTime) / duration, 1);
            const current = Math.floor(progress * range + start);
            obj.innerHTML = prefix + current.toLocaleString() + (id === 'sc-balance' ? '<span class="unit">SC</span>' : (id === 'team-count' ? '<span class="unit">人</span>' : ''));
            if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    }

    window.onload = fetchAssets;
</script>
</body>
</html>
