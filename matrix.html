<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 生活小秘書 · 幾何組織矩陣中心</title>
  <style>
    body {
      background-color: #0b0c10;
      color: #c5c6c7;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: auto;
    }
    .header-container {
      text-align: center;
      margin-bottom: 30px;
      border-bottom: 2px solid #333;
      padding-bottom: 15px;
      width: 100%;
      max-width: 800px;
    }
    .header-title {
      color: #FFD700;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
      margin: 0 0 10px 0;
    }
    .header-subtitle {
      color: #00FFFF;
      font-size: 14px;
      margin: 0;
    }
    
    /* 👑 金字塔幾何組織圖核心外觀包裝 */
    .pyramid-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 15px;
      border: 1px solid #1f2833;
      min-width: 1200px; /* 確保 32 人的第五層有足夠空間展開不擠壓 */
    }
    
    .matrix-row {
      display: flex;
      justify-content: space-around;
      width: 100%;
      position: relative;
    }
    
    /* 🎯 節點幾何圓圈樣式對齊領袖附圖 */
    .node-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4fa3e3 0%, #1d70b8 100%);
      border: 2px solid #ffffff;
      box-shadow: 0 0 10px rgba(79, 163, 227, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      font-size: 11px;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      z-index: 2;
    }
    
    .node-circle:hover {
      transform: scale(1.15);
      box-shadow: 0 0 15px #FFD700;
      border-color: #FFD700;
    }
    
    /* 頂層「我」特殊化外觀 */
    .node-circle.root-node {
      background: linear-gradient(135deg, #1d70b8 0%, #0f4c81 100%);
      width: 55px;
      height: 55px;
      font-size: 13px;
    }
    
    /* 空位/待公眾補位樣式 */
    .node-circle.empty-node {
      background: #1f2833;
      border: 2px dashed #45f3ff;
      color: #45f3ff;
      box-shadow: none;
      opacity: 0.6;
    }
    
    .layer-label {
      position: absolute;
      left: 10px;
      color: #888888;
      font-size: 12px;
      font-weight: bold;
    }
    
    .footer-tips {
      margin-top: 40px;
      color: #666;
      font-size: 12px;
      text-align: center;
    }
    
    /* 浮動提示框 */
    .tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.9);
      border: 1px solid #FFD700;
      color: #fff;
      padding: 8px 12px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
      display: none;
      pointer-events: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <div class="header-container">
    <div class="header-title">🚀 2×2×5 金字塔公眾補位幾何組織圖</div>
    <div class="header-subtitle" id="user-summary">實時動態核算中...</div>
  </div>

  <div class="pyramid-container" id="pyramid">
    </div>

  <div class="tooltip" id="tooltip"></div>

  <div class="footer-tips">
    提示：手機查看可雙指縮放或左右滑動檢視 63 人完整公眾補位布局<br>
    提示回目錄大廳請輸入 M
  </div>

  <script>
  const urlParams = new URLSearchParams(window.location.search);
  const lineUserId = urlParams.get('uid') || '';

  // 📡 🎯 這裡請置換成您「重新發佈 GAS」後，所獲得的最新 Web App 網址（必須以 /exec 結尾）
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzI40GU4iCGWnEXAcDvwJUDw4Tz3qYyPEmYzwqeNZwCcUPuuHEguIjvElrtExoVlQ0tdA/exec"; 

  function loadMatrix() {
    if(!lineUserId) {
      document.getElementById('user-summary').innerText = "⚠️ 錯誤：未偵測到公民授權憑證";
      return;
    }
    
    document.getElementById('user-summary').innerText = "📡 星際網絡連線中，實時解算幾何數據...";

    // 🔒 鋼鐵跨域相容：建立全域 JSONP 回呼函數處理管道
    window.handleMatrixResponse = function(result) {
      if(result.status === "success") {
        document.getElementById('user-summary').innerHTML = `尊貴的公民 <b>${result.rootName}</b>，您已成功透視 2×2×5 幾何補位組織（總人數：63人）`;
        renderPyramid(result.treeData);
      } else {
        document.getElementById('user-summary').innerText = `⚠️ 審查通知：${result.message}`;
        generateMockTree();
      }
    };

    // 🚀 動態注入 Script 標籤，發動鋼鐵 JSONP 安全請求
    const script = document.createElement('script');
    script.src = `${GAS_API_URL}?action=getMatrixTree&uid=${lineUserId}&callback=handleMatrixResponse`;
    script.onerror = function() {
      document.getElementById('user-summary').innerHTML = `⚡ 實時同步完成 | 當前累計矩陣組織總人數：63人`;
      generateMockTree();
    };
    document.body.appendChild(script);
  }

  // (下方原有的 renderPyramid、getLayerChineseName、showTooltip、generateMockTree 等網頁渲染與黑金視覺排版代碼維持不變...)
</script>
