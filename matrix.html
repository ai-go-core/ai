<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>AI 生活小秘書 · 許願牆矩陣中心</title>
    <style>
        /* 🌌 旗艦黑金美學 */
        body {
            background-color: #0A0A0A;
            color: #E0E0E0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            overflow-x: auto;
        }

        h1 {
            color: #D4AF37;
            font-size: 24px;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #00FFFF;
            font-size: 14px;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* 📋 數據看板區 */
        .dashboard {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .dash-card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 10px 15px;
            flex: 1;
        }
        .dash-card .title { font-size: 11px; color: #888888; margin-bottom: 5px; }
        .dash-card .val { font-size: 16px; font-weight: bold; color: #D4AF37; }

        /* 📱 畫布容器 */
        .matrix-container {
            min-width: 1024px; 
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* 🔺 矩陣層級 (Rows) */
        .matrix-level {
            display: flex;
            justify-content: center;
            width: 100%;
            gap: 6px;
            margin-bottom: 5px;
            position: relative;
        }

        /* 🔗 垂直推舉鏈結線 */
        .link-line {
            width: 2px;
            height: 20px;
            background-color: #333333;
            margin: 0 auto;
            transition: all 0.5s ease;
        }
        .link-line.active {
            background: linear-gradient(to bottom, #D4AF37, #AA7C11);
            box-shadow: 0 0 8px rgba(212,175,55,0.8);
        }

        /* 👤 成員節點基本樣式 */
        .member-node {
            background: linear-gradient(135deg, #1A1A1A 0%, #111111 100%);
            border: 1px solid #333333;
            border-radius: 6px;
            padding: 6px 2px;
            min-width: 62px;
            font-size: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.6);
            transition: all 0.5s ease;
        }

        /* 🎨 向上溯源未激活 */
        .lvl-up { 
            border-color: #444444; 
            background: #121212; 
            color: #666666; 
            opacity: 0.5; 
        } 
        /* 💡 向上溯源開通激活 */
        .lvl-up.active {
            border-color: #D4AF37;
            background: linear-gradient(135deg, #3A2F0B 0%, #111111 100%);
            color: #D4AF37;
            font-weight: bold;
            opacity: 1;
            box-shadow: 0 0 12px rgba(212,175,55,0.5);
        }

        /* 👑 0代核心（您）與下方代數 */
        .lvl-self { border-color: #D4AF37; background: linear-gradient(135deg, #2A2005 0%, #111111 100%); color: #D4AF37; font-weight: bold; box-shadow: 0 0 12px rgba(212,175,55,0.5); min-width: 90px; font-size: 11px; } 
        .lvl-d1   { border-color: #32CD32; color: #32CD32; } 
        .lvl-d2   { border-color: #1E90FF; color: #1E90FF; } 
        .lvl-d3   { border-color: #BA55D3; color: #BA55D3; } 
        .lvl-d4   { border-color: #FFA500; color: #FFA500; } 
        .lvl-d5   { border-color: #FF4500; color: #FF4500; } 

        .member-node .role {
            font-size: 8px;
            opacity: 0.8;
            margin-bottom: 2px;
            display: block;
        }

        .member-node .uid {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 分隔虛線 */
        .divider-line {
            width: 100%;
            border-top: 1px dashed #333333;
            margin: 20px 0;
            position: relative;
        }
        .divider-line span {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #0A0A0A;
            padding: 0 15px;
            font-size: 11px;
            color: #666666;
        }

        /* 📝 底部提示區 */
        .footer-tips {
            margin-top: 30px;
            border-top: 1px solid #222222;
            padding-top: 15px;
            font-size: 13px;
            color: #888888;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <h1>🚀 2×2×5 許願牆矩陣公眾補位地圖</h1>
    <div class="subtitle" id="status-text">🪐 矩陣星際節點網絡載入中...</div>

    <div class="dashboard">
        <div class="dash-card">
            <div class="title">🔺 往上贊助溯源</div>
            <div class="val" id="dash-up-status">1 ~ 5 代完成</div>
        </div>
        <div class="dash-card">
            <div class="title">🟢 往下接受贊助</div>
            <div class="val">1 ~ 5 代開啟</div>
        </div>
        <div class="dash-card">
            <div class="title">👥 矩陣滿載總體量</div>
            <div class="val">63 人幾何圖</div>
        </div>
    </div>

    <div class="matrix-container">
        
        <div id="upstream-area" style="display: flex; flex-direction: column; align-items: center; width: 100%;"></div>

        <div class="divider-line"><span>⚡ 核心起點 · 往下接受公眾補位 ⚡</span></div>

        <div id="downstream-area" style="display: flex; flex-direction: column; align-items: center; width: 100%;"></div>

    </div>

    <div class="footer-tips">
        💡 提示：手機查看可使用雙指縮放或左右滑動，檢視完整的 2×2×5 公眾補位金字塔布局。<br>
        <span style="color: #666;">提示回目錄大廳請輸入 M</span>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. 解析網址傳遞過來的變數
            const urlParams = new URLSearchParams(window.location.search);
            
            // 🎯 智慧解析：優先抓取 &nick= 的網路暱稱，若沒有才降級拿 ref
            let rawNick = urlParams.get('nick');
            let myDisplayName = rawNick ? decodeURIComponent(rawNick) : (urlParams.get('ref') || '領袖新星');
            
            let payLevel = parseInt(urlParams.get('pay')) || 0; 
            
            document.getElementById("status-text").innerText = `當前定位節點：${myDisplayName}（第 0 代）`;
            document.getElementById("dash-up-status").innerText = `已成功開通 ${payLevel} 代`;

            const upstreamArea = document.getElementById("upstream-area");
            const downstreamArea = document.getElementById("downstream-area");

            // 2. 動態生成：往上贊助 1-5 代與垂直推舉鏈結線
            for (let upLvl = 5; upLvl >= 1; upLvl--) {
                let isLevelActive = (payLevel >= upLvl);
                let activeClass = isLevelActive ? "active" : "";

                const upRow = document.createElement("div");
                upRow.className = "matrix-level";
                
                const node = document.createElement("div");
                node.className = `member-node lvl-up ${activeClass}`;
                node.innerHTML = `
                    <span class="role">🔺 往上第 ${upLvl} 代</span>
                    <div class="uid">${isLevelActive ? '✨ 已開通管道' : '🔒 待開通節點'}</div>
                `;
                upRow.appendChild(node);
                upstreamArea.appendChild(upRow);

                if (upLvl >= 1) {
                    const line = document.createElement("div");
                    let isLineActive = (payLevel >= upLvl);
                    line.className = `link-line ${isLineActive ? 'active' : ''}`;
                    upstreamArea.appendChild(line);
                }
            }

            // 3. 渲染：第 0 代自己（網路暱稱呈現）+ 往下接受贊助 1-5 代空球金字塔
            const downConfigs = [
                { lvl: 0, count: 1, styleClass: 'lvl-self', label: '👑 0代 (您)' },
                { lvl: 1, count: 2, styleClass: 'lvl-d1', label: '下 1 代' },
                { lvl: 2, count: 4, styleClass: 'lvl-d2', label: '下 2 代' },
                { lvl: 3, count: 8, styleClass: 'lvl-d3', label: '下 3 代' },
                { lvl: 4, count: 16, styleClass: 'lvl-d4', label: '下 4 代' },
                { lvl: 5, count: 32, styleClass: 'lvl-d5', label: '下 5 代' }
            ];

            downConfigs.forEach(config => {
                const downRow = document.createElement("div");
                downRow.className = "matrix-level";
                
                for (let i = 0; i < config.count; i++) {
                    const node = document.createElement("div");
                    node.className = `member-node ${config.styleClass}`;
                    
                    let nodeName = "公眾補位";
                    if (config.lvl === 0) {
                        nodeName = myDisplayName; // 🎯 完美嵌入來自 O 欄的網路暱稱！
                    }

                    node.innerHTML = `
                        <span class="role">${config.label}</span>
                        <div class="uid">${nodeName}</div>
                    `;
                    downRow.appendChild(node);
                }
                downstreamArea.appendChild(downRow);
            });
        });
    </script>
</body>
</html>
